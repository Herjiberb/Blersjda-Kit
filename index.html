        const ClientWinAnimation = ({ avatar }) => {
            if (!avatar) return null;
            return (
                <div className="fixed bottom-10 right-4 z-50 flex flex-col items-center pointer-events-none fade-in">
                    <div className="bg-black/80 px-4 py-1 rounded-full text-green-400 font-bold mb-2 text-sm uppercase shadow-lg">Winner!</div>
                    <div className="sniffing relative">
                        <MonsterAvatar attributes={avatar} size={130} />
                        <div className="goo-drop" style={{ background: avatar.color, left: '20%', animationDelay: '0s' }}></div>
                        <div className="goo-drop" style={{ background: avatar.color, left: '50%', animationDelay: '0.4s' }}></div>
                        <div className="goo-drop" style={{ background: avatar.color, left: '80%', animationDelay: '0.8s' }}></div>
                    </div>
                </div>
            );
        };

        // ==========================================
        // ONLINE CLIENT (THE PHONE)
        // ==========================================
        const OnlineClient = ({ goBack }) => {
            const [isEditingAvatar, setIsEditingAvatar] = useState(false);
            const [myAvatar, setMyAvatar] = useState(null);
            const [myVotedFor, setMyVotedFor] = useState(null);
            const [conn, setConn] = useState(null);
            const [code, setCode] = useState('');
            const [name, setName] = useState('');
            const [clientState, setClientState] = useState('LOGIN'); 
            const [battleAvatars, setBattleAvatars] = useState(null);
            
            const [promptsToAnswer, setPromptsToAnswer] = useState([]);
            const [currentPromptIndex, setCurrentPromptIndex] = useState(0);
            const [answerInput, setAnswerInput] = useState('');
			const [clientTimeLeft, setClientTimeLeft] = useState(0);
            
            const [voteData, setVoteData] = useState(null); 
            const [userId] = useState(() => {
                let uid = localStorage.getItem('blersjda_uid');
                if(!uid) { uid = generateUUID(); localStorage.setItem('blersjda_uid', uid); }
                return uid;
            });

            // Recover name if exists
            useEffect(() => {
                const savedName = localStorage.getItem('blersjda_name');
                if(savedName) setName(savedName);
            }, []);

            const joinGame = () => {
                if(!code || !name) return;
                localStorage.setItem('blersjda_name', name);
                
                // Clean and normalize user text input to ensure topic path uniformity
                const roomCode = code.toUpperCase().trim();
                
                // Establish a secure socket connection
                const mqttClient = mqtt.connect('wss://broker.hivemq.com:8884/mqtt');
                
                mqttClient.on('connect', () => {
                    console.log(`Player connecting to secure cluster room: ${roomCode}`);
                    
                    // Subscribe to an isolated private inbound topic for this specific player
                    mqttClient.subscribe(`blersjda/${roomCode}/client/${userId}`, (err) => {
                        if (!err) {
                            // Mock connection object so submitAnswer() and submitVote() execute flawlessly
                            const mockConnection = {
                                send: (payload) => {
                                    mqttClient.publish(`blersjda/${roomCode}/host`, JSON.stringify(payload));
                                }
                            };
                            
                            setConn(mockConnection);
                            
                            // Instantly register with the host
                            mockConnection.send({ type: 'JOIN', userId, name });
                        } else {
                            console.error("Player connection path subscription failed:", err);
                        }
                    });
                });
            
                mqttClient.on('message', (topic, message) => {
                    try {
                        const data = JSON.parse(message.toString());
                        // Delivers game state transitions, prompt lists, and voting options directly to the client UI
                        handleHostMessage(data);
                    } catch (e) {
                        console.error("Failed to parse client inbound MQTT packet:", e);
                    }
                });
            };

            const handleHostMessage = (data) => {
                if(data.type === 'LOBBY_JOINED') {
                    setClientState('WAITING_LOBBY');
                    if (data.avatar) setMyAvatar(data.avatar);
                    setVoteData(data.isAudience ? "You joined as Audience!" : "You're in! Look at the big screen.");
                }
                if(data.type === 'KICKED') {
                    alert(data.msg);
                    goBack();
                }
                if(data.type === 'STATE_WAITING') {
                    setClientState('WAITING');
                    setVoteData(data.msg);
                }
                if(data.type === 'STATE_ANSWERING') {
                    setPromptsToAnswer(data.prompts);
                    setCurrentPromptIndex(0);
                    setAnswerInput('');
                    setClientState('ANSWERING');
                    if (navigator.vibrate) navigator.vibrate([200, 100, 200]); // Vibrate: BZZZ - pause - BZZZ
                }
                if(data.type === 'STATE_VOTING') {
                    setVoteData(data);
                    setClientState('VOTING');
                    if (navigator.vibrate && !data.readOnly) navigator.vibrate(200); // Short buzz to vote
                }
                if(data.type === 'STATE_LEADERBOARD') {
                    setVoteData(data);
                    setClientState('LEADERBOARD');
                }
				if(data.type === 'TIMER_SYNC') {
                    setClientTimeLeft(data.timeLeft);
                }
                if(data.type === 'STATE_REVEAL') {
                    setVoteData(data);
                    setClientState('REVEAL');
                }
            };

            const submitAnswer = () => {
                if(!answerInput.trim()) return;
                conn.send({ 
                    type: 'SUBMIT_ANSWER', 
                    userId, 
                    answer: answerInput.trim(), 
                    prompt: promptsToAnswer[currentPromptIndex] 
                });
                
                if(currentPromptIndex < promptsToAnswer.length - 1) {
                    setCurrentPromptIndex(prev => prev + 1);
                    setAnswerInput('');
                } else {
                    setClientState('WAITING_BATTLE'); // CHANGED STATE
                    setBattleAvatars([generateAvatar(), generateAvatar()]); // GENERATE 2 RANDOM AVATARS
                }
            };

            const submitVote = (playerId) => {
                conn.send({ type: 'SUBMIT_VOTE', userId, votedFor: playerId });
                setMyVotedFor(playerId);
                setClientState('WAITING');
                setVoteData("Vote cast! Look at the screen.");
            };

            // Carousel Helper Component for Customizer
            const AttributeCarousel = ({ label, options, currentVal, attrKey }) => {
                const currentIndex = options.indexOf(currentVal) === -1 ? 0 : options.indexOf(currentVal);
                const prevIndex = (currentIndex - 1 + options.length) % options.length;
                const nextIndex = (currentIndex + 1) % options.length;

                const handleSwap = (newVal) => {
                    const updated = { ...myAvatar, [attrKey]: newVal };
                    setMyAvatar(updated);
                    if(conn && conn.open) conn.send({ type: 'UPDATE_AVATAR', userId, avatar: updated });
                };

                return (
                    <div className="mb-6 w-full flex flex-col items-center">
                        <div className="text-cyan-300 font-bold uppercase tracking-widest text-xs mb-2">{label}</div>
                        <div className="flex items-center justify-center gap-6 w-full px-4">
                            {/* Previous */}
                            <button onClick={() => handleSwap(options[prevIndex])} className="opacity-40 hover:opacity-100 transition-all scale-75 hover:scale-90 touch-manipulation">
                                <MonsterAvatar attributes={{...myAvatar, [attrKey]: options[prevIndex]}} size={60} />
                            </button>
                            {/* Current / Active */}
                            <div className="scale-125 z-10 border-b-4 border-pink-500 rounded-3xl p-2 bg-purple-900/50 shadow-[0_0_15px_rgba(236,72,153,0.4)] transition-transform touch-manipulation">
                                <MonsterAvatar attributes={myAvatar} size={80} />
                            </div>
                            {/* Next */}
                            <button onClick={() => handleSwap(options[nextIndex])} className="opacity-40 hover:opacity-100 transition-all scale-75 hover:scale-90 touch-manipulation">
                                <MonsterAvatar attributes={{...myAvatar, [attrKey]: options[nextIndex]}} size={60} />
                            </button>
                        </div>
                    </div>
                );
            };

            return (
                <div className="w-full max-w-md flex flex-col items-center scale-in text-center px-4 relative z-10">
                    
                    {clientState === 'REVEAL' && voteData && (
						((voteData.p1Votes > voteData.p2Votes && (userId === voteData.p1.userId || myVotedFor === voteData.p1.userId)) ||
						 (voteData.p2Votes > voteData.p1Votes && (userId === voteData.p2.userId || myVotedFor === voteData.p2.userId))) 
					) && (
						voteData.stats && (() => {
							const myStat = voteData.stats.find(s => s.userId === userId || s.userId === myVotedFor);
							if(!myStat) return false;
							const maxVotes = Math.max(...voteData.stats.map(s => s.votes));
							return myStat.votes === maxVotes && maxVotes > 0;
						})() && (
							<ClientWinAnimation avatar={myAvatar} />
						)
					)}
					
                    {clientState === 'LOGIN' && (
                        <div className="w-full glass-panel p-8 rounded-3xl shadow-2xl border border-pink-500/30">
                            <h2 className="text-4xl font-black mb-8 text-pink-400 uppercase tracking-widest">Join Game</h2>
                            
                            <div className="text-left mb-6">
                                <label className="block text-sm font-bold text-purple-300 mb-2 uppercase tracking-widest ml-2">Room Code</label>
                                <input 
                                    type="text" placeholder="ABCD" maxLength={4}
                                    value={code} onChange={e => setCode(e.target.value.toUpperCase())}
                                    className="w-full p-5 rounded-2xl bg-purple-950/80 border-2 border-pink-500/50 text-center font-mono text-4xl font-black uppercase outline-none focus:border-pink-400 focus:ring-4 focus:ring-pink-500/20 transition-all shadow-inner"
                                />
                            </div>

                            <div className="text-left mb-10">
                                <label className="block text-sm font-bold text-purple-300 mb-2 uppercase tracking-widest ml-2">Your Name</label>
                                <input 
                                    type="text" placeholder="Nickname" maxLength={12}
                                    value={name} onChange={e => setName(e.target.value)}
                                    className="w-full p-5 rounded-2xl bg-purple-950/80 border-2 border-cyan-500/50 text-center font-bold text-3xl outline-none focus:border-cyan-400 focus:ring-4 focus:ring-cyan-500/20 transition-all shadow-inner"
                                />
                            </div>
                            
                            <Button onClick={joinGame} color="pink" disabled={!name.trim() || code.length !== 4} className="h-16">Enter Game</Button>
                            <button onClick={goBack} className="block mx-auto mt-6 text-gray-400 font-bold uppercase tracking-widest text-sm hover:text-white transition-colors">Cancel</button>
                        </div>
                    )}

                    {clientState === 'WAITING_LOBBY' && !isEditingAvatar && (
                        <div className="w-full flex flex-col items-center mt-10 p-8 glass-panel rounded-3xl scale-in">
                            <h2 className="text-4xl font-black text-pink-400 uppercase tracking-widest mb-4">You're In!</h2>
                            <p className="text-2xl text-cyan-200 font-bold mb-8">{voteData}</p>
                            
                            {myAvatar && !voteData.includes("Audience") && (
                                <div className="flex flex-col items-center w-full mt-4">
                                    <div className="mb-6 animate-bounce" style={{animationDuration: '2s'}}>
                                        <MonsterAvatar attributes={myAvatar} size={120} />
                                    </div>
                                    <Button onClick={() => setIsEditingAvatar(true)} color="blue" className="text-lg py-3">
                                        🎨 Customize Avatar
                                    </Button>
                                </div>
                            )}
                        </div>
                    )}

                    {/* The Avatar Customizer - Now available in both Lobby and Waiting states */}
                    {(clientState === 'WAITING_LOBBY' || clientState === 'WAITING') && isEditingAvatar && myAvatar && (
                        <div className="w-full flex flex-col items-center mt-4 p-6 glass-panel rounded-3xl scale-in z-20 relative">
                            <h2 className="text-2xl font-black text-pink-400 uppercase tracking-widest mb-6">Pimp Your Critter</h2>
                            
                            <div className="w-full max-h-[50vh] overflow-y-auto overflow-x-hidden scrollbar-hide">
                                <AttributeCarousel label="Color" options={AVATAR_COLORS} currentVal={myAvatar.color} attrKey="color" />
                                <AttributeCarousel label="Body Shape" options={AVATAR_BODIES} currentVal={myAvatar.body} attrKey="body" />
                                <AttributeCarousel label="Eyes" options={AVATAR_EYES} currentVal={myAvatar.eyes} attrKey="eyes" />
                                <AttributeCarousel label="Mouth" options={AVATAR_MOUTHS} currentVal={myAvatar.mouth} attrKey="mouth" />
                                <AttributeCarousel label="Accessory" options={AVATAR_ACCESSORIES} currentVal={myAvatar.accessory} attrKey="accessory" />
                            </div>

                            <Button onClick={() => setIsEditingAvatar(false)} color="green" className="mt-6 text-lg py-3">
                                ✓ Looking Good
                            </Button>
                        </div>
                    )}

                    {/* Standard WAITING state with Avatar Button Added */}
                    {clientState === 'WAITING' && !isEditingAvatar && (
                        <div className="w-full flex flex-col items-center mt-10 p-8 glass-panel rounded-3xl scale-in">
                            <h2 className="text-4xl font-black text-cyan-400 mb-6 uppercase tracking-widest">Hold tight.</h2>
                            <p className="text-2xl text-purple-200 font-bold leading-relaxed">{typeof voteData === 'string' ? voteData : 'Look at the main screen.'}</p>
                            
                            {/* NEW: Avatar and customize button while waiting between rounds */}
                            {myAvatar && !String(voteData).includes("Audience") && (
                                <div className="flex flex-col items-center w-full mt-8">
                                    <div className="mb-6">
                                        <MonsterAvatar attributes={myAvatar} size={100} />
                                    </div>
                                    <Button onClick={() => setIsEditingAvatar(true)} color="blue" className="text-lg py-3">
                                        🎨 Customize Avatar
                                    </Button>
                                </div>
                            )}
                        </div>
                    )}

                    {clientState === 'ANSWERING' && (
                        <div className="w-full text-left mt-4 p-6 glass-panel rounded-3xl border-t-8 border-pink-500">
                            <p className="text-cyan-400 font-black tracking-widest uppercase mb-4 text-sm bg-black/30 inline-block px-4 py-1 rounded-full">
                                Prompt {currentPromptIndex + 1} of {promptsToAnswer.length}
                            </p>
                            <h3 className="text-3xl font-black mb-8 leading-snug drop-shadow-md">{promptsToAnswer[currentPromptIndex]}</h3>
                            
                            <div className="text-4xl font-black text-cyan-300 text-center mb-6">
                                {clientTimeLeft}s
                            </div>
                            
                            <div className="relative mb-4">
                                <textarea 
                                    value={answerInput}
                                    maxLength={100}
                                    onChange={e => setAnswerInput(e.target.value)}
                                    placeholder="Type your brilliant answer..."
                                    className={`w-full p-5 rounded-2xl bg-purple-950 border-2 text-2xl font-bold outline-none focus:ring-2 focus:ring-cyan-500/50 h-40 resize-none shadow-inner transition-colors ${answerInput.length >= 90 ? 'border-red-500' : 'border-pink-500 focus:border-cyan-400'}`}
                                />
                                <span className={`absolute bottom-4 right-4 font-mono font-bold text-sm px-2 py-1 rounded bg-black/50 ${answerInput.length >= 90 ? 'text-red-400 animate-pulse' : 'text-purple-400'}`}>
                                    {answerInput.length}/100
                                </span>
                            </div>
                            <Button onClick={submitAnswer} color="pink" disabled={!answerInput.trim()} className="h-16">Submit Answer</Button>
                        </div>
                    )}
					
					{clientState === 'WAITING_BATTLE' && (
                        <div className="w-full flex flex-col items-center mt-10 p-8 glass-panel rounded-3xl scale-in">
                            <h2 className="text-3xl font-black text-red-500 mb-2 uppercase tracking-widest animate-pulse">Answers In!</h2>
                            <p className="text-lg text-purple-200 font-bold mb-6 text-center">Prepare for absolute carnage...</p>

                            <div className="w-full h-48 relative overflow-hidden rounded-xl border-4 border-red-700 bg-black/50">
                                {battleAvatars && <JSBattleAnimation avatars={battleAvatars} />}
                            </div>
                        </div>
                    )}
					
                    {clientState === 'VOTING' && voteData && voteData.answers && (
                        <div className="w-full text-center mt-4 p-4 glass-panel rounded-3xl border-t-8 border-cyan-500">
                            <p className="text-cyan-400 font-black mb-6 uppercase tracking-widest text-lg animate-pulse">
                                {voteData.readOnly ? "Watch The Battle!" : "Vote Now"}
                            </p>
                            <h3 className="text-2xl font-bold mb-8 text-purple-200 leading-snug">{voteData.prompt}</h3>
                            
                            {voteData.readOnly && voteData.msg && (
                                <p className="text-pink-400 font-bold mb-4">{voteData.msg}</p>
                            )}
                    
                            {/* SMART SCALING LIST FOR CLIENT */}
                            <div className="flex flex-col gap-4 max-h-[50vh] overflow-y-auto px-2 pb-4 scrollbar-hide">
                                {shuffle([...voteData.answers]).map((ans, idx) => {
                                    const isCompact = voteData.answers.length >= 4;
                                    return (
                                        <button 
                                            key={ans.id}
                                            onClick={() => !voteData.readOnly && submitVote(ans.id)}
                                            disabled={voteData.readOnly}
                                            className={`w-full ${isCompact ? 'p-4 text-xl' : 'p-6 text-2xl'} ${idx%2===0 ? 'bg-pink-700 border-pink-900' : 'bg-blue-700 border-blue-900'} rounded-2xl font-black break-words leading-tight transition-all ${!voteData.readOnly ? 'hover:bg-opacity-80 shadow-[0_6px_0_rgba(0,0,0,0.3)] border-b-8 active:border-b-0 active:translate-y-2' : 'opacity-75 cursor-default border-2'}`}
                                        >
                                            "{ans.text}"
                                        </button>
                                    );
                                })}
                            </div>
                            
                            {voteData.allowPass && !voteData.readOnly && (
                                <button 
                                    onClick={() => submitVote('PASS')}
                                    className="mt-8 text-gray-400 hover:text-white font-bold uppercase tracking-widest p-4 transition-colors"
                                >
                                    Pass / Don't Vote
                                </button>
                            )}
                        </div>
                    )}
					{clientState === 'REVEAL' && voteData && voteData.prompt && (
                        <div className="w-full text-center mt-4 p-4 glass-panel rounded-3xl border-t-8 border-green-500 scale-in">
                            <h2 className="text-2xl font-black text-green-400 mb-6 uppercase tracking-widest wobble-anim">Results!</h2>
                            <h3 className="text-xl font-bold mb-6 text-purple-200">{voteData.prompt}</h3>
                            
                            <div className="flex flex-col gap-4 text-left slide-up-fade relative overflow-hidden p-2">
                                {voteData.stats.map(stat => {
                                    const maxVotes = Math.max(...voteData.stats.map(s => s.votes));
                                    const isWinner = stat.votes === maxVotes && maxVotes > 0;
                                    const isLoser = !isWinner && maxVotes > 0; // Ensures tie doesn't trigger bomb
                                    
                                    const blastDelay = Math.random() * 0.2 + 0.9;

                                    return (
                                        <div key={stat.userId} 
                                            className={`relative p-4 rounded-xl transition-all ${isWinner ? 'bg-green-900/50 border-2 border-green-400 shadow-[0_0_15px_rgba(74,222,128,0.4)] z-20' : 'bg-black/80 z-10'} ${isLoser ? 'border-2 border-red-900/80 overflow-hidden' : ''}`} 
                                            style={{ animationDelay: isLoser ? '0.9s' : '0s' }}>
                                            
                                            {/* Bomb Blast on Loser */}
                                            {isLoser && (
                                                <div className="absolute inset-0 z-50 pointer-events-none rounded-xl">
                                                    <div className="absolute top-[20%] left-1/2 opacity-0 bomb-anim text-6xl" style={{ animationDelay: `${blastDelay}s` }}>💣</div>
                                                    
                                                    {/* Fire Base */}
                                                    <div className="absolute bottom-[-10px] left-0 w-full h-1/2 bg-gradient-to-t from-orange-600/50 via-red-500/20 to-transparent mix-blend-screen fire-anim opacity-0 pointer-events-none" style={{ animationDelay: `${blastDelay + 0.4}s` }}></div>
                                                    
                                                    {/* Fire Emojis */}
                                                    <div className="absolute bottom-[-5px] left-0 w-full flex justify-around fire-anim opacity-0 text-3xl" style={{ animationDelay: `${blastDelay + 0.4}s` }}>
                                                        <span className="animate-pulse">🔥</span>
                                                        <span className="animate-pulse" style={{animationDelay: '0.1s'}}>🔥</span>
                                                        <span className="animate-pulse" style={{animationDelay: '0.3s'}}>🔥</span>
                                                        <span className="animate-pulse" style={{animationDelay: '0.2s'}}>🔥</span>
                                                    </div>
                                                </div>
                                            )}

                                            <p className="text-xl font-bold mb-2 relative z-10">"{stat.answer}"</p>
                                            <p className="text-pink-400 font-black uppercase text-sm mb-2 relative z-10">{stat.name}</p>
                                            <div className="flex justify-between font-mono font-bold text-sm relative z-10">
                                                <span className="text-cyan-300 bg-black/50 px-2 py-1 rounded">{stat.votes} Votes</span>
                                                <span className="text-yellow-300 bg-black/50 px-2 py-1 rounded">+{stat.score} Pts</span>
                                            </div>
                                            {stat.voters && stat.voters.length > 0 && (
                                                <div className="mt-3 text-xs text-green-300 italic opacity-80 break-words relative z-10">Voted: {stat.voters.join(', ')}</div>
                                            )}
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    )}
                    {clientState === 'LEADERBOARD' && voteData && voteData.players && (
                        <div className="w-full max-w-md mt-4 p-6 glass-panel rounded-3xl border-t-8 border-yellow-500 scale-in">
                            <h2 className="text-4xl font-black text-yellow-400 mb-2 uppercase tracking-widest text-center">
                                {voteData.isFinal ? "Final Ranks" : `Round ${voteData.round} Over`}
                            </h2>
                            <p className="text-center text-purple-200 mb-8 font-bold text-sm uppercase tracking-widest">
                                {voteData.isFinal ? "Game Over!" : "Look at the big screen"}
                            </p>
                            
                            <div className="flex flex-col gap-3">
                                {voteData.players.map((p, i) => (
                                    <div key={p.userId} className={`p-4 rounded-xl flex justify-between items-center font-bold shadow-md ${i===0 ? 'bg-yellow-600/30 border border-yellow-500' : 'bg-black/30'}`}>
                                        <div className="flex gap-4 items-center">
                                            <span className={i===0 ? 'text-yellow-400 text-2xl' : 'text-purple-400'}>#{i+1}</span>
                                            <span className="text-xl break-all">{p.name}</span>
                                        </div>
                                        <span className="text-cyan-300 font-mono text-2xl ml-4">{p.score}</span>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
