        body {

            color: #fff; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            overflow-x: hidden; 
            touch-action: manipulation;
            background-image: radial-gradient(circle at 50% 50%, #20114b 0%, #0f0a29 100%);
        }
        
        /* Typography & Animations */
        .bouncing-title { animation: bounce 2s infinite; text-shadow: 0 4px 20px rgba(0, 0, 0, 0.7); }
        .bouncing-win { animation: bounceWin 0.5s infinite alternate; }
        .fade-in { animation: fadeIn 0.5s ease-out forwards; }
        .scale-in { animation: scaleIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        
        @keyframes bounce { 0%, 100% { transform: translateY(-3%); } 50% { transform: translateY(3%); } }
        @keyframes bounceWin { 0% { transform: scale(1) translateY(0); } 100% { transform: scale(1.1) translateY(-15px); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes scaleIn { from { opacity: 0; transform: scale(0.5); } to { opacity: 1; transform: scale(1); } }
        
        /* UI Elements */
        .glass-panel { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3); }
        input[type="text"], textarea { font-size: 16px; transition: all 0.2s; }
        input[type="text"]:focus, textarea:focus { transform: scale(1.02); }
        
        /* Loading Spinner */
        .spinner { border: 4px solid rgba(255,255,255,0.1); border-left-color: #ec4899; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Popups */
        .floating-popup {
            position: absolute;
            pointer-events: none;
            font-weight: 900;
            text-transform: uppercase;
            animation: floatUpAndFade 3s ease-out forwards;
            opacity: 0;
            z-index: 0;
        }
        @keyframes floatUpAndFade {
            0% { transform: translateY(20px) rotate(-10deg) scale(0.8); opacity: 0; }
            20% { transform: translateY(-10px) rotate(5deg) scale(1.1); opacity: 0.8; }
            80% { transform: translateY(-60px) rotate(-5deg) scale(1); opacity: 0.8; }
            100% { transform: translateY(-80px) rotate(0deg) scale(0.9); opacity: 0; }
        }

        .sweep-text {
            background: linear-gradient(90deg, #ec4899, #eab308, #06b6d4, #ec4899);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 2s linear infinite, scaleIn 0.5s ease-out;
            text-shadow: 0px 0px 20px rgba(236,72,153,0.5);
        }
        @keyframes shine { to { background-position: 200% center; } }

        /* New Animations */
        .blinking-eyes { transform-origin: center; animation: blink 4s infinite; }
        @keyframes blink { 0%, 96%, 98%, 100% { transform: scaleY(1); } 97% { transform: scaleY(0.1); } }
        
        .sniffing { animation: sniff 1.5s ease-in-out infinite; }
        @keyframes sniff { 
            0%, 100% { transform: translateY(0) rotate(0deg); } 
            25% { transform: translateY(-8px) rotate(-5deg) scale(1.05); } 
            50% { transform: translateY(0) rotate(0deg) scale(1); } 
            75% { transform: translateY(-8px) rotate(5deg) scale(1.05); } 
        }
        
        .goo-drop { position: absolute; bottom: -10px; width: 14px; height: 14px; border-radius: 50%; opacity: 0; animation: drip 1.5s infinite ease-in; }
        @keyframes drip { 0% { transform: translateY(0) scale(1); opacity: 0.8; } 100% { transform: translateY(50px) scale(0); opacity: 0; } }
		/* Battle Animation */
        .battle-container { position: relative; width: 100%; height: 160px; overflow: hidden; margin-top: 20px; border-radius: 20px; background: rgba(0,0,0,0.2); border: 2px solid rgba(236,72,153,0.3); }
        .fighter-left { position: absolute; left: -80px; bottom: 20px; animation: rollInLeft 1s forwards cubic-bezier(0.2, 0.8, 0.2, 1); }
        .fighter-right { position: absolute; right: -80px; bottom: 20px; animation: rollInRight 1s forwards cubic-bezier(0.2, 0.8, 0.2, 1); }
        .fighter-left > svg { animation: bob 1s infinite alternate ease-in-out 1s; }
        .fighter-right > svg { animation: bob 1s infinite alternate ease-in-out 1.2s; transform: scaleX(-1); }

        .fireball { position: absolute; width: 24px; height: 24px; background: radial-gradient(circle, #fff, #ffeb3b, #ff9800, #f44336); border-radius: 50%; box-shadow: 0 0 15px #ff9800; top: 60px; opacity: 0; z-index: 10; }
        .fb-left { left: 80px; animation: shootRight 2s infinite 1s; }
        .fb-right { right: 80px; animation: shootLeft 2s infinite 1.5s; }

        @keyframes rollInLeft { from { transform: translateX(0) rotate(-360deg); } to { transform: translateX(100px) rotate(0deg); } }
        @keyframes rollInRight { from { transform: translateX(0) rotate(360deg); } to { transform: translateX(-100px) rotate(0deg); } }
        @keyframes shootRight { 0% { left: 80px; opacity: 1; transform: scale(0.5); } 80% { opacity: 1; transform: scale(1.5); } 100% { left: calc(100% - 80px); opacity: 0; transform: scale(2); } }
        @keyframes shootLeft { 0% { right: 80px; opacity: 1; transform: scale(0.5); } 80% { opacity: 1; transform: scale(1.5); } 100% { right: calc(100% - 80px); opacity: 0; transform: scale(2); } }
        @keyframes bob { from { transform: translateY(0); } to { transform: translateY(-10px); } }
		
		/* New Fun Animations */
        .wobble-anim { animation: wobble 2s infinite ease-in-out; }
        @keyframes wobble { 0%, 100% { transform: rotate(-3deg); } 50% { transform: rotate(3deg) scale(1.05); } }
        
        .pulse-glow { animation: pulseGlow 2s infinite alternate; }
        @keyframes pulseGlow { 0% { box-shadow: 0 0 10px rgba(236,72,153,0.5); } 100% { box-shadow: 0 0 30px rgba(236,72,153,1); } }
        
        .slide-up-fade { animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* Epic Blue Lightning Logo */
        .logo-box {
            background: radial-gradient(circle at center, rgba(0, 102, 255, 0.3) 0%, rgba(0, 0, 0, 0.8) 100%);
            border: 3px solid #00f3ff;
            box-shadow: 0 0 30px rgba(0, 243, 255, 0.6), inset 0 0 40px rgba(0, 85, 255, 0.6);
            border-radius: 30px;
            padding: 40px 20px;
            position: relative;
            overflow: hidden;
        }
        .logo-box::after {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: conic-gradient(transparent, rgba(0, 243, 255, 0.4), transparent 20%);
            animation: spin 4s linear infinite;
        }
        .lightning-overlay {
            position: absolute; inset: 0; pointer-events: none;
            background-image: url('data:image/svg+xml;utf8,<svg width="200" height="200" xmlns="http://www.w3.org/2000/svg"><path d="M100 0 L60 100 L120 80 L80 200 L160 80 L80 100 Z" fill="rgba(0,243,255,0.15)"/></svg>');
            background-size: 150px; animation: flashOverlay 2s infinite;
        }
        @keyframes flashOverlay { 0%, 93%, 98% { opacity: 0; transform: scale(1); } 95%, 99% { opacity: 1; transform: scale(1.1); } }
        
        .epic-text {
            background: linear-gradient(180deg, #ffffff 0%, #00f3ff 50%, #0055ff 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .pulse-glow-blue { animation: pulseGlowBlue 1.5s infinite alternate; }
        @keyframes pulseGlowBlue { 0% { box-shadow: 0 0 15px rgba(0,102,255,0.5); } 100% { box-shadow: 0 0 40px rgba(0,243,255,1); } }

        /* Battle Animation - INTENSE */
        .battle-container { 
            position: relative; width: 100%; height: 180px; overflow: hidden; margin-top: 20px; 
            border-radius: 20px; background: #050011; border: 4px solid #ff0000;
            box-shadow: 0 0 40px rgba(255, 0, 0, 0.6), inset 0 0 20px rgba(255, 0, 0, 0.5);
            animation: lightningBg 3s infinite;
        }
        @keyframes lightningBg { 0%, 95%, 98% { background: #050011; } 96%, 99% { background: #e0f7fa; } }
        
        .fighter-left { position: absolute; left: 10px; bottom: 20px; animation: rollInLeft 0.5s forwards cubic-bezier(0.2, 0.8, 0.2, 1); }
        .fighter-right { position: absolute; right: 10px; bottom: 20px; animation: rollInRight 0.5s forwards cubic-bezier(0.2, 0.8, 0.2, 1); }
        
        .fighter-left > svg { animation: intenseFightLeft 0.4s infinite alternate ease-in-out 0.5s; }
        .fighter-right > svg { animation: intenseFightRight 0.4s infinite alternate ease-in-out 0.5s; transform: scaleX(-1); }

        @keyframes intenseFightLeft {
            0% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(40px, -20px) rotate(20deg) scale(1.1); }
            50% { transform: translate(15px, 10px) rotate(-10deg); }
            75% { transform: translate(50px, -30px) rotate(35deg) scale(1.3); }
            100% { transform: translate(-10px, 0) rotate(-5deg); }
        }
        @keyframes intenseFightRight {
            0% { transform: scaleX(-1) translate(0, 0) rotate(0deg); }
            25% { transform: scaleX(-1) translate(40px, -20px) rotate(20deg) scale(1.1); }
            50% { transform: scaleX(-1) translate(15px, 10px) rotate(-10deg); }
            75% { transform: scaleX(-1) translate(50px, -30px) rotate(35deg) scale(1.3); }
            100% { transform: scaleX(-1) translate(-10px, 0) rotate(-5deg); }

            0% { transform: translate(0,0) scale(1.5); opacity: 1; }

            from { background-position: 0 0; }

            5% { transform: translateY(-70px) scale(1.2) rotate(15deg); }
            10% { transform: translateY(0) scale(1.1) translateX(30px) rotate(-10deg); filter: drop-shadow(0 0 20px #ff00ff); }
            15% { transform: translateY(0) scale(1) rotate(0); filter: none; }

        @keyframes jumpPoundRight {
            0%, 20%, 100% { transform: translateY(0) scale(1) scaleX(-1); }
            5% { transform: translateY(-70px) scale(1.2) scaleX(-1) rotate(-15deg); }
            10% { transform: translateY(0) scale(1.1) translateX(-30px) scaleX(-1) rotate(10deg); filter: drop-shadow(0 0 20px #00ffff); }
            15% { transform: translateY(0) scale(1) scaleX(-1) rotate(0); filter: none; }

            position: absolute; top: 40px; left: 80px; right: 80px; height: 30px;

            11% { opacity: 1; transform: scale(1); }
            14% { opacity: 1; left: 60px; transform: scale(2.5); }
            15%, 100% { opacity: 0; left: 60px; transform: scale(3); }

        .shotgun-container {

        .bullet-hole {

        .shatter { animation: shatterAnim 1s forwards; transform-origin: center; animation-fill-mode: forwards; }

        @keyframes pumpShoot {
            0% { transform: translateY(-50%) translateX(100px) rotate(-30deg); opacity: 0; }
            20% { transform: translateY(-50%) translateX(-20px) rotate(0deg); opacity: 1; }
            40% { transform: translateY(-50%) translateX(10px) rotate(10deg); }
            50% { transform: translateY(-50%) translateX(-20px) rotate(0deg); }
            60% { transform: translateY(-50%) translateX(-20px) rotate(0deg) scale(1.3); filter: brightness(2); }
            65% { transform: translateY(-50%) translateX(40px) rotate(20deg); filter: brightness(1); }
            100% { transform: translateY(-50%) translateX(200px) rotate(45deg); opacity: 0; }
        }
        @keyframes blastHole { to { opacity: 1; } }
        @keyframes shatterAnim {
            0% { transform: rotate(0deg) scale(1); filter: contrast(1); }
            100% { transform: rotate(10deg) scale(0.9) translateY(40px); opacity: 0.4; filter: contrast(2) grayscale(0.8) blur(1px); }
        }

        // ==========================================

        const DB_NAME = 'BlersjdaDB';
        const DB_VERSION = 1;
        const STORE_NAME = 'GameHistory';

        const initDB = () => new Promise((resolve, reject) => {
            const req = indexedDB.open(DB_NAME, DB_VERSION);
            req.onupgradeneeded = e => {
                if(!e.target.result.objectStoreNames.contains(STORE_NAME)) {
                    e.target.result.createObjectStore(STORE_NAME, { keyPath: 'id' });
                }
            };
            req.onsuccess = () => resolve(req.result);
            req.onerror = () => reject(req.error);
        });

        const saveGameHistory = async (gameData) => {
            try {
                const db = await initDB();
                const tx = db.transaction(STORE_NAME, 'readwrite');
                tx.objectStore(STORE_NAME).put({ id: Date.now(), ...gameData });
            } catch(e) { console.error("Failed to save history:", e); }
        };

        const getGameHistory = async () => {
            try {
                const db = await initDB();
                return new Promise((resolve) => {
                    const req = db.transaction(STORE_NAME, 'readonly').objectStore(STORE_NAME).getAll();
                    req.onsuccess = () => resolve(req.result.sort((a,b)=>b.id-a.id));

        };

        const speakText = (text, enabled) => {

        // ==========================================
        // MONSTER AVATAR COMPONENT

        const AVATAR_COLORS = ['#ec4899', '#22c55e', '#06b6d4', '#f97316', '#eab308', '#ef4444', '#a855f7', '#bef264', '#f87171', '#34d399'];

        const generateAvatar = (existingAvatars = []) => {

            do {

                isUnique = !existingAvatars.some(a => a.color === att.color && a.body === att.body && a.eyes === att.eyes && a.mouth === att.mouth && a.accessory === att.accessory);

		// ==========================================
        // JS BATTLE ANIMATION COMPONENT (EPIC UPGRADE)
        // ==========================================
        const JSBattleAnimation = ({ avatars }) => {
            const [leftPos, setLeftPos] = useState({ x: -150, y: 0, r: 0, s: 1 });
            const [rightPos, setRightPos] = useState({ x: 150, y: 0, r: 0, s: 1 });
            const [fireballs, setFireballs] = useState([]);
            const [clashEffect, setClashEffect] = useState(false);

            useEffect(() => {
                let frame;
                let startTime = performance.now();
                const cycleDuration = 4000; // 4 seconds full choreography

                const animate = (time) => {
                    const elapsed = time - startTime;
                    const t = (elapsed % cycleDuration) / cycleDuration;
                    
                    let lX = -120, lY = 0, lR = 0, lS = 1;
                    let rX = 120, rY = 0, rR = 0, rS = 1;
                    let clashing = false;
                    let activeFireballs = [];

                    if (t < 0.25) {
                        // PHASE 1: FIREBALL EXCHANGE (0-1s)
                        const p = t / 0.25;
                        lX = -120; rX = 120;
                        // Bobbing slightly
                        lY = Math.sin(p * Math.PI * 4) * 10;
                        rY = Math.cos(p * Math.PI * 4) * 10;
                        
                        // Emit fireballs
                        if (p > 0.2 && p < 0.8) {
                            activeFireballs.push({ x: -100 + (p * 200), y: lY, dir: 'right' });
                            activeFireballs.push({ x: 100 - ((p-0.1) * 200), y: rY, dir: 'left' });
                        }

                    } else if (t < 0.5) {
                        // PHASE 2: TORNADO SPIN APPROACH (1-2s)
                        const p = (t - 0.25) / 0.25;
                        lX = -120 + (p * 80); // Move inward
                        rX = 120 - (p * 80);
                        lR = p * 1080; // Triple spin
                        rR = -(p * 1080);
                        
                    } else if (t < 0.7) {
                        // PHASE 3: HAYMAKERS (2-2.8s)
                        const p = (t - 0.5) / 0.2;
                        lX = -40; rX = 40;
                        
                        // Wild swings (oscillating rotation and zoom)
                        lR = Math.sin(p * Math.PI * 8) * 45;
                        rR = Math.cos(p * Math.PI * 8) * 45;
                        lS = 1 + Math.sin(p * Math.PI * 4) * 0.2;
                        rS = 1 + Math.cos(p * Math.PI * 4) * 0.2;
                        
                        if (p > 0.1 && p < 0.9) clashing = true;

                    } else {
                        // PHASE 4: THE BEATDOWN (2.8-4s)
                        // Left wins this cycle, Right is dizzy
                        const p = (t - 0.7) / 0.3;
                        
                        // Right player (dizzy & beaten)
                        rX = 50 + Math.random() * 10 - 5;
                        rY = Math.random() * 10 - 5;
                        rR = p * 360; // Slow dizzy spin
                        rS = 0.8; // Squished
                        
                        // Left player (Rapid Jabs)
                        const jabPhase = (p * 20) % 1; // Fast rapid jabs
                        lX = jabPhase < 0.5 ? -20 : 10; // Lunge forward
                        lR = jabPhase < 0.5 ? -10 : 20;
                        lY = 0;
                        
                        // Impact sparks
                        if (jabPhase > 0.4 && jabPhase < 0.6) clashing = true;
                    }

                    setLeftPos({ x: lX, y: lY, r: lR, s: lS });
                    setRightPos({ x: rX, y: rY, r: rR, s: rS });
                    setFireballs(activeFireballs);
                    setClashEffect(clashing);

                    frame = requestAnimationFrame(animate);
                };

                frame = requestAnimationFrame(animate);
                return () => cancelAnimationFrame(frame);
            }, []);

            return (

                    {/* Fireball Renders */}

                    </div>

                        <MonsterAvatar attributes={avatars[1]} size={90} />
                        {/* Dizzy stars for phase 4 */}
                        {rightPos.s < 1 && (
                            <div className="absolute -top-4 left-1/2 -translate-x-1/2 w-full text-center text-xl animate-spin z-10">💫</div>

        // ==========================================
        const App = () => {
            const [view, setView] = useState('MENU');

            // Secret Keycombo Listener
            useEffect(() => {
                let keyBuffer = '';
                const handleKeyDown = (e) => {
                    if (e.key.length !== 1) return; // Ignore Shift/Ctrl
                    keyBuffer = (keyBuffer + e.key).toUpperCase().slice(-7);
                    if (keyBuffer === 'HISTORY') {
                        setView(prev => prev === 'MENU' ? 'HISTORY' : prev);
                        keyBuffer = '';
                    }
                };
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, []);

            return (
                <div className="min-h-screen flex flex-col items-center justify-center p-4 relative z-10">
                    <div className="sparkle-bg"></div>
                    {view === 'MENU' && <MainMenu setView={setView} />}
                    {view === 'HOST' && <OnlineHost goBack={() => setView('MENU')} />}
                    {view === 'JOIN' && <OnlineClient goBack={() => setView('MENU')} />}
                    {view === 'HISTORY' && <HistoryViewer goBack={() => setView('MENU')} />}
                </div>
            );
        };
		
		// ==========================================
		// LIGHTNING LOGO COMPONENT
		// ==========================================
		const LightningLogo = () => {
			const canvasRef = useRef(null);

			useEffect(() => {
				const canvas = canvasRef.current;
				if (!canvas) return;
				const ctx = canvas.getContext('2d');
				let animationId;

				// Automatically match canvas size to screen/parent container bounds
				const resize = () => {
					const rect = canvas.parentElement.getBoundingClientRect();
					canvas.width = rect.width || 400;
					canvas.height = rect.height || 200;
				};
				resize();
				window.addEventListener('resize', resize);

				let activeStrikes = [];

				// Generates natural zig-zag lightning paths between points
				const createStrike = () => {
					const w = canvas.width;
					const h = canvas.height;
					
					const isHorizontal = Math.random() > 0.5;
					let sx, sy, ex, ey;

					if (isHorizontal) {
						sx = 0;
						sy = Math.random() * (h * 0.6) + h * 0.2;
						ex = w;
						ey = Math.random() * (h * 0.6) + h * 0.2;
					} else {
						sx = Math.random() * w;
						sy = 0;
						ex = Math.random() * w;
						ey = h;
					}

					// Picks between Yellow and Electric Blue
					const color = Math.random() > 0.5 ? '#facc15' : '#38bdf8';
					const segments = 12;
					const displacement = 25; // Jaggedness factor
					
					const path = [{ x: sx, y: sy }];
					for (let i = 1; i < segments; i++) {
						const t = i / segments;
						const baseX = sx + (ex - sx) * t;
						const baseY = sy + (ey - sy) * t;
						
						const jitterX = (Math.random() - 0.5) * displacement;
						const jitterY = (Math.random() - 0.5) * displacement;
						
						path.push({ x: baseX + jitterX, y: baseY + jitterY });
					}
					path.push({ x: ex, y: ey });

					return {
						path,
						color,
						alpha: 1,
						width: Math.random() * 2 + 2.5,
						decay: Math.random() * 0.06 + 0.04 // Fade out speed
					};
				};

				let frameCounter = 0;

				const render = () => {
					ctx.clearRect(0, 0, canvas.width, canvas.height);
					
					frameCounter++;
					// Fire a flash strike randomly at balanced intervals
					if (frameCounter % 25 === 0 && Math.random() > 0.4) {
						activeStrikes.push(createStrike());
						if (Math.random() > 0.75) {
							// Trigger an immediate double fork strike
							setTimeout(() => {
								if (canvasRef.current) activeStrikes.push(createStrike());
							}, 60);
						}
					}

					activeStrikes = activeStrikes.filter(strike => {
						strike.alpha -= strike.decay;
						if (strike.alpha <= 0) return false;

						ctx.save();
						ctx.globalAlpha = strike.alpha;
						ctx.strokeStyle = strike.color;
						ctx.lineWidth = strike.width;
						
						// Lightning Neon Glow Effect
						ctx.shadowColor = strike.color;
						ctx.shadowBlur = 14;

						ctx.beginPath();
						ctx.moveTo(strike.path[0].x, strike.path[0].y);
						for (let i = 1; i < strike.path.length; i++) {
							ctx.lineTo(strike.path[i].x, strike.path[i].y);
						}
						ctx.stroke();

						// Ultra-bright inner electrical core
						ctx.strokeStyle = '#ffffff';
						ctx.lineWidth = strike.width * 0.35;
						ctx.shadowBlur = 0;
						ctx.stroke();

						ctx.restore();
						return true;
					});

					animationId = requestAnimationFrame(render);
				};

				render();

				return () => {
					window.removeEventListener('resize', resize);
					cancelAnimationFrame(animationId);
				};
			}, []);

			return (
				<div className="relative w-full h-52 flex items-center justify-center mb-2 overflow-hidden select-none">
					{/* Background Canvas for Lightning Strikes */}
					<canvas ref={canvasRef} className="absolute inset-0 w-full h-full pointer-events-none z-0" />
					
					{/* Cleaner, non-chaotic logo typography */}
					<h1 className="text-6xl md:text-7xl font-black uppercase tracking-tight relative z-10 text-center select-none leading-none drop-shadow-[0_5px_15px_rgba(0,0,0,0.5)]">
						Blersjda<br/>
						<span className="text-transparent bg-clip-text bg-gradient-to-r from-yellow-400 via-yellow-200 to-blue-400">
							Madness
						</span>
					</h1>
				</div>
			);
		};

        // ==========================================
        // MAIN MENU
        // ==========================================
        const MainMenu = ({ setView }) => (
            <div className="max-w-md w-full flex flex-col items-center gap-4 scale-in text-center">
                <LightningLogo />
                
                <p className="text-xl mb-10 text-cyan-300 font-bold tracking-widest uppercase wobble-anim">The Ultimate Party Game</p>
                
                <div className="w-full space-y-8 flex flex-col relative z-10">
                    <button 
                        onClick={() => setView('HOST')} 
                        className="bg-transparent border-none shadow-none text-5xl md:text-6xl font-black text-white transition-all duration-300 hover:text-yellow-400 hover:scale-110 hover:animate-pulse tracking-tight"
                    >
                        HOST GAME
                    </button>
                    <button 
                        onClick={() => setView('JOIN')} 
                        className="bg-transparent border-none shadow-none text-5xl md:text-6xl font-black text-white transition-all duration-300 hover:text-yellow-400 hover:scale-110 hover:animate-pulse tracking-tight"
                    >
                        JOIN GAME
                    </button>
                </div>
                
                <div className="mt-12 text-sm text-purple-200 glass-panel p-5 rounded-2xl w-full slide-up-fade pointer-events-none">
                    <p className="mb-2"><strong>How to play:</strong> Host puts this on a big screen or TV. Everyone else joins using their phones!</p>
                    <p className="text-pink-300 font-bold">4+ Players Required.</p>
                </div>
            </div>
        );

        // ==========================================
        // ONLINE HOST (THE BIG SCREEN)
        // ==========================================
        const OnlineHost = ({ goBack }) => {
            const [roomCode, setRoomCode] = useState('');
            const [players, setPlayers] = useState([]);
            const [audience, setAudience] = useState([]);
            const [settings, setSettings] = useState({ familyFriendly: false, tts: true, useOldMusic: false });
			const [showKickMenu, setShowKickMenu] = useState(false);
            
            const [gameState, setGameState] = useState('LOBBY'); // LOBBY, ANSWERING, VOTING, REVEAL, ROUND_END, GAME_END
            const [round, setRound] = useState(1);
            const [clashes, setClashes] = useState([]);
            const [currentClashIndex, setCurrentClashIndex] = useState(0);
            const [timer, setTimer] = useState(0);
            const [usedPrompts, setUsedPrompts] = useState([]);

            const connectionsRef = useRef({});
            const stateRef = useRef();
            const allRoundsHistory = useRef([]);
			
			// Audio ref for background music
            const audioRef = useRef(typeof Audio !== "undefined" ? new Audio('music.wav') : null);

            useEffect(() => {
                const handleBeforeUnload = (e) => {
                    e.preventDefault();
                    e.returnValue = "Are you sure you want to leave? This will destroy the current game!";
                };
                window.addEventListener('beforeunload', handleBeforeUnload);
                return () => window.removeEventListener('beforeunload', handleBeforeUnload);
            }, []);
            
            useEffect(() => {
                const audio = audioRef.current;
                if (!audio) return;
                let fadeInterval;

                if (gameState === 'ANSWERING') {
                    let track = settings.useOldMusic ? 'music_old.wav' : 'music.wav';
                    if (round === 2) track = settings.useOldMusic ? 'music_2_old.wav' : 'music_2.wav';
                    if (round === 3) track = settings.useOldMusic ? 'music_3_old.wav' : 'music_3.wav';
                    
                    if (!audio.src.endsWith(track)) audio.src = track;
                    
                    audio.loop = true;
                    audio.volume = 0;
                    audio.play().catch(e => console.log("Audio play prevented:", e));
                    // Fade in
                    let vol = 0;
                    fadeInterval = setInterval(() => {
                        vol += 0.05;
                        if (vol >= 0.5) { vol = 0.5; clearInterval(fadeInterval); } // 0.5 max volume
                        audio.volume = vol;
                    }, 100);
                } else if (audio.volume > 0) {
                    // Fade out
                    let vol = audio.volume;
                    fadeInterval = setInterval(() => {
                        vol -= 0.1;
                        if (vol <= 0) {
                            vol = 0;
                            clearInterval(fadeInterval);
                            audio.pause();
                            audio.currentTime = 0;
                        }
                        try { audio.volume = vol; } catch(e){}
                    }, 100);
                }
                return () => clearInterval(fadeInterval);
            }, [gameState]);
            
            useEffect(() => {
                stateRef.current = { players, audience, gameState, round, clashes, currentClashIndex, settings };
            }, [players, audience, gameState, round, clashes, currentClashIndex, settings]);

            // Initialize Host Peer
            useEffect(() => {
                const code = generateCode();
                setRoomCode(code);
                
                // Connect securely over TLS via Port 8884 (Required for HTTPS/GitHub Pages)
                const mqttClient = mqtt.connect('wss://broker.hivemq.com:8884/mqtt');
                const mockConnections = {};
            
                mqttClient.on('connect', () => {
                    console.log(`Host successfully secured room topic: blersjda/${code}/host`);
                    // Subscribe to client actions intended for this specific host
                    mqttClient.subscribe(`blersjda/${code}/host`, (err) => {
                        if (err) console.error("Host subscription routing error:", err);
                    });
                });
            
                mqttClient.on('message', (topic, message) => {
                    try {
                        const data = JSON.parse(message.toString());
                        
                        if (data && data.userId) {
                            const userId = data.userId;
                            
                            // Dynamically build a mock connection object mimicking PeerJS interfaces
                            if (!mockConnections[userId]) {
                                mockConnections[userId] = {
                                    open: true,
                                    metadata: { userId },
                                    send: (payload) => {
                                        // Route outgoing server frames directly to this client's private inbox
                                        mqttClient.publish(`blersjda/${code}/client/${userId}`, JSON.stringify(payload));
                                    }
                                };
                            }
                            
                            // Directly feeds your core room orchestration logic unmodified
                            handleClientMessage(data, mockConnections[userId]);
                        }
                    } catch (e) {
                        console.error("Failed to parse host MQTT message packet:", e);
                    }
                });
            
                // Clean up connections when the host terminates or unmounts the lobby
                return () => {
                    if (mqttClient) mqttClient.end();
                };
            }, []);

            // Send to everyone connected
            const broadcast = (type, payload) => {
                Object.values(connectionsRef.current).forEach(conn => {
                    if(conn && conn.open) conn.send({ type, ...payload });
                });
            };

            const sendToClient = (userId, type, payload) => {
                const conn = connectionsRef.current[userId];
                if(conn && conn.open) conn.send({ type, ...payload });
            };

            const handleClientDisconnect = (userId) => {
                // We keep them in state but mark disconnected if needed, but for simplicity
                // we'll rely on active connection checks during broadcasts.
            };

            const syncPlayerState = (userId, isAudience) => {
                const { gameState, clashes, currentClashIndex } = stateRef.current;
                
                if (gameState === 'ANSWERING' && !isAudience) {
                    const myClashes = clashes.filter(c => c.players.some(p => p.userId === userId));
                    const unanswered = myClashes.filter(c => !c.answers[userId]).map(c => c.prompt);
                    if (unanswered.length > 0) {
                        sendToClient(userId, 'STATE_ANSWERING', { prompts: unanswered });
                    } else {
                        sendToClient(userId, 'STATE_WAITING', { msg: "Answers in! Waiting for others..." });
                    }
                } 
                else if (gameState === 'VOTING') {
                    const clash = clashes[currentClashIndex];
                    if (!isAudience && clash.players.some(p => p.userId === userId)) {
                        sendToClient(userId, 'STATE_VOTING', { 
                            prompt: clash.prompt, 
                            answers: clash.players.map(p => ({ id: p.userId, text: clash.answers[p.userId] })),
                            allowPass: false,
                            readOnly: true,
                            msg: "Your battle! You can't vote, but watch the results."
                        });
                    } else {
                        sendToClient(userId, 'STATE_VOTING', { 
                            prompt: clash.prompt, 
                            answers: clash.players.map(p => ({ id: p.userId, text: clash.answers[p.userId] })),
                            allowPass: isAudience,
                            readOnly: false
                        });
                    }
                }
                else {
                    sendToClient(userId, 'STATE_WAITING', { msg: "Look at the big screen!" });
                }
            };

            const handleClientMessage = (data, conn) => {
                if(data.type === 'JOIN') {
                    const { userId, name } = data;
                    conn.metadata = { userId };
                    connectionsRef.current[userId] = conn;

                    setPlayers(prevPlayers => {
                        const existingPlayer = prevPlayers.find(p => p.userId === userId);
                        if (existingPlayer) {
                            existingPlayer.name = name; // Update name
                            existingPlayer.connected = true;
                            setTimeout(() => syncPlayerState(userId, false), 500);
                            return [...prevPlayers];
                        } 
                        
                        if (stateRef.current.gameState === 'LOBBY') {
                            let finalName = name;
                            if (prevPlayers.some(p => p.name.toLowerCase() === name.toLowerCase())) {
                                finalName = name + ` ${Math.floor(Math.random()*100)}`;
                            }
                            const avatar = generateAvatar(prevPlayers.map(p => p.avatar));
                            conn.send({ type: 'LOBBY_JOINED', isAudience: false, avatar });
                            return [...prevPlayers, { userId, name: finalName, score: 0, avatar, connected: true }];
                        } 
                        return prevPlayers;
                    });

                    if (stateRef.current.gameState !== 'LOBBY') {
                        const isExistingPlayer = stateRef.current.players.some(p => p.userId === userId);
                        if (!isExistingPlayer) {
                            setAudience(prev => {
                                const exists = prev.find(a => a.userId === userId);
                                if (exists) {
                                    exists.name = name;
                                    return [...prev];
                                }
                                const audAvatar = generateAvatar([...stateRef.current.players, ...prev].map(p => p.avatar));
                                conn.send({ type: 'LOBBY_JOINED', isAudience: true, avatar: audAvatar });
                                return [...prev, { userId, name, avatar: audAvatar, connected: true }];
                            });
                            setTimeout(() => syncPlayerState(userId, true), 500);
                        }
                    }

                    // Handle audience join if not in lobby
                    if (stateRef.current.gameState !== 'LOBBY') {
                        const isExistingPlayer = stateRef.current.players.some(p => p.userId === userId);
                        if (!isExistingPlayer) {
                            setAudience(prev => {
                                const exists = prev.find(a => a.userId === userId);
                                if (exists) {
                                    exists.name = name;
                                    return [...prev];
                                }
                                return [...prev, { userId, name, connected: true }];
                            });
                            conn.send({ type: 'LOBBY_JOINED', isAudience: true });
                            setTimeout(() => syncPlayerState(userId, true), 500);
                        }
                    }
                }

                if(data.type === 'UPDATE_AVATAR') {
                    setPlayers(prev => prev.map(p => 
                        p.userId === data.userId ? { ...p, avatar: data.avatar } : p
                    ));
                    sendToClient(data.userId, 'AVATAR_UPDATED', { avatar: data.avatar });
                }
                
                if(data.type === 'SUBMIT_ANSWER') {
                    setClashes(prev => {
                        const next = [...prev];
                        const clash = next.find(c => c.prompt === data.prompt);
                        if (clash) {
                            clash.answers[data.userId] = data.answer;
                        }
                        return next;
                    });
                }

                if(data.type === 'SUBMIT_VOTE') {
                    setClashes(prev => {
                        const next = [...prev];
                        const clash = next[stateRef.current.currentClashIndex];
                        if (clash) {
                            clash.votes[data.userId] = data.votedFor; 
                        }
                        return next;
                    });
                }
            };

            const startGame = () => {
                if(players.length < 4) return;
                setRound(1);
                allRoundsHistory.current = [];
                startRound(1, players, usedPrompts); // Changed from [] to usedPrompts
            };

            const startRound = (r, currentPlayers, prevUsed) => {
            setRound(r);
            
            let available = PROMPTS.filter(p => !prevUsed.includes(p.text));
            if(settings.familyFriendly) available = available.filter(p => p.family);
            
            // Fallback: If we run out of unique prompts, reset the pool
            if (available.length < currentPlayers.length) {
                prevUsed = [];
                available = PROMPTS.filter(p => settings.familyFriendly ? p.family : true);
            }
            
            available = shuffle(available);

            const newClashes = [];
            const newUsed = [...prevUsed];

            // --- NEW DYNAMIC GROUPING LOGIC ---
            // Requirement: Exactly 4 prompts, every player answers exactly 2 prompts.
            const numPrompts = 4;
            const totalSlots = currentPlayers.length * 2;
            let sizes = Array(numPrompts).fill(Math.floor(totalSlots / numPrompts));
            for(let i = 0; i < totalSlots % numPrompts; i++) sizes[i]++;
            
            let groups = [];
            let validGroups = false;
            let attempts = 0;
            
            let playerPool = [];
            currentPlayers.forEach(p => { playerPool.push(p, p); });
            
            while(!validGroups && attempts < 500) {
                playerPool = shuffle([...playerPool]);
                groups = Array.from({length: numPrompts}, () => []);
                let poolIdx = 0;
                validGroups = true;
                
                for(let i=0; i<numPrompts; i++) {
                    for(let j=0; j<sizes[i]; j++) {
                        let p = playerPool[poolIdx++];
                        if(groups[i].some(existing => existing.userId === p.userId)) {
                            validGroups = false;
                            break;
                        }
                        groups[i].push(p);
                    }
                    if(!validGroups) break;
                }
                attempts++;
            }

            // Fallback sequential assignment if randomizer hits a dead end
            if (!validGroups) {
                groups = Array.from({length: numPrompts}, () => []);
                let counts = {};
                currentPlayers.forEach(p => counts[p.userId] = 0);
                for(let i=0; i<numPrompts; i++) {
                    // Sort available by those who need assignments the most
                    let available = currentPlayers.filter(p => counts[p.userId] < 2).sort((a,b) => counts[a.userId] - counts[b.userId]);
                    for(let j=0; j<sizes[i]; j++) {
                        if (available[j]) {
                            groups[i].push(available[j]);
                            counts[available[j].userId]++;
                        }
                    }
                }
            }

            // Assign prompts to the valid groups
            groups.forEach(group => {
                const prompt = available.pop() || { text: `Wildcard prompt for a massive brawl!` };
                newUsed.push(prompt.text);
                
                newClashes.push({
                    prompt: prompt.text,
                    players: group, 
                    answers: {}, 
                    votes: {}   
                });
            });
            // --- END DYNAMIC GROUPING ---

            setUsedPrompts(newUsed);
            setClashes(newClashes);
            setGameState('ANSWERING');
            
            // Notify players of their prompts
            currentPlayers.forEach(player => {
                const myPrompts = newClashes.filter(c => c.players.some(p => p.userId === player.userId));
                sendToClient(player.userId, 'STATE_ANSWERING', { prompts: myPrompts.map(p => p.prompt) });
            });
            
            stateRef.current.audience.forEach(aud => {
                sendToClient(aud.userId, 'STATE_WAITING', { msg: "Players are answering prompts..." });
            });

            speakText(r === 3 ? `Welcome to the final round: The Whip of the Blersj!` : `Round ${r} begins. Players, look at your devices!`, settings.tts);

            let timeLeft = 90;
            setTimer(timeLeft);
            broadcast('TIMER_SYNC', { timeLeft });
            
            const int = setInterval(() => {
                timeLeft--;
                setTimer(timeLeft);
                broadcast('TIMER_SYNC', { timeLeft });
                
                // Check if ALL players in ALL clashes have answered
                const allAnswered = stateRef.current.clashes.every(c => c.players.every(p => c.answers[p.userId]));
                if(timeLeft <= 0 || allAnswered) {
                    clearInterval(int);
                    setClashes(prev => {
                        const filled = [...prev];
                        filled.forEach(c => {
                            c.players.forEach(p => {
                                if(!c.answers[p.userId]) c.answers[p.userId] = shuffle(DEFAULT_ANSWERS)[0];
                            });
                        });
                        return filled;
                    });
                    setTimeout(() => startVotingPhase(0), 1000);
                }
            }, 1000);
        };

            const startVotingPhase = (clashIndex) => {
                if(clashIndex >= stateRef.current.clashes.length) {
                    setGameState('ROUND_END');
                    speakText(`Round ${stateRef.current.round} is over! Let's see the leaderboard.`, settings.tts);
                    
                    const sortedPlayers = [...stateRef.current.players].sort((a,b) => b.score - a.score);
                    broadcast('STATE_LEADERBOARD', { players: sortedPlayers, round: stateRef.current.round, isFinal: false });
                    return;
                }

                setGameState('VOTING');
                setCurrentClashIndex(clashIndex);
                const clash = stateRef.current.clashes[clashIndex];

                speakText(clash.prompt, settings.tts);

                const mappedAnswers = clash.players.map(cp => ({ id: cp.userId, text: clash.answers[cp.userId] }));

                // Notify Players
                stateRef.current.players.forEach(p => {
                    if(!clash.players.some(cp => cp.userId === p.userId)) {
                        sendToClient(p.userId, 'STATE_VOTING', { 
                            prompt: clash.prompt, answers: mappedAnswers, allowPass: false, readOnly: false
                        });
                    } else {
                        sendToClient(p.userId, 'STATE_VOTING', { 
                            prompt: clash.prompt, answers: mappedAnswers, allowPass: false, readOnly: true,
                            msg: "Your battle! You can't vote, but watch the results."
                        });
                    }
                });

                stateRef.current.audience.forEach(a => {
                    sendToClient(a.userId, 'STATE_VOTING', { 
                        prompt: clash.prompt, answers: mappedAnswers, allowPass: true
                    });
                });

                let timeLeft = 25;
                setTimer(timeLeft);
                const int = setInterval(() => {
                    timeLeft--;
                    setTimer(timeLeft);
                    
                    const currentClash = stateRef.current.clashes[clashIndex];
                    const expectedPlayerVotes = stateRef.current.players.filter(p => 
                        connectionsRef.current[p.userId]?.open && !currentClash.players.some(cp => cp.userId === p.userId)
                    ).length;
                    
                    const expectedAudienceVotes = stateRef.current.audience.filter(a => connectionsRef.current[a.userId]?.open).length;
                    const expectedTotal = expectedPlayerVotes + expectedAudienceVotes;
                    const voteCount = Object.keys(currentClash.votes).length;

                    if(timeLeft <= 0 || (expectedTotal > 0 && voteCount >= expectedTotal)) {
                        clearInterval(int);
                        revealWinner(clashIndex);
                    }
                }, 1000);
            };

            const revealWinner = (clashIndex) => {
            setGameState('REVEAL');
            
            const clash = stateRef.current.clashes[clashIndex];
            const votes = Object.values(clash.votes).filter(v => v !== 'PASS');
            const totalValidVotes = votes.length;

            const getVoterName = (uid) => {
                const p = stateRef.current.players.find(x => x.userId === uid);
                if (p) return p.name;
                const a = stateRef.current.audience.find(x => x.userId === uid);
                return a ? a.name : 'Audience';
            };

            const basePoints = stateRef.current.round === 3 ? 4000 : 1000 * stateRef.current.round;
            
            // Calculate stats dynamically for all players in this clash
            const playerStats = clash.players.map(p => {
                const pVotesCount = votes.filter(v => v === p.userId).length;
                const pVoters = Object.keys(clash.votes).filter(uid => clash.votes[uid] === p.userId).map(getVoterName);
                let score = totalValidVotes > 0 ? Math.floor((pVotesCount/totalValidVotes) * basePoints) : 0;
                const isSweep = totalValidVotes > 0 && pVotesCount === totalValidVotes;
                if (isSweep) score += 500;
                
                return { userId: p.userId, name: p.name, avatar: p.avatar, answer: clash.answers[p.userId], votes: pVotesCount, voters: pVoters, score, isSweep };
            });

            // Find the maximum votes to award a bonus
            const maxVotes = Math.max(...playerStats.map(s => s.votes));
            const winners = playerStats.filter(s => s.votes === maxVotes);
            
            // Award bonus to the winner(s)
            if (maxVotes > 0) {
                winners.forEach(w => {
                    const statRef = playerStats.find(s => s.userId === w.userId);
                    statRef.score += Math.floor(basePoints * 0.2);
                });
            }

            broadcast('STATE_REVEAL', { 
                prompt: clash.prompt,
                stats: playerStats // Sending dynamic array instead of p1/p2
            });

            // Distribute scores
            setPlayers(prev => prev.map(p => {
                const clashStat = playerStats.find(s => s.userId === p.userId);
                if(clashStat) return { ...p, score: p.score + clashStat.score };
                return p;
            }));

            setClashes(prev => {
                const next = [...prev];
                next[clashIndex].revealData = { playerStats, winners }; 
                return next;
            });

            let winnerMsg = "It's a tie!";
            if (maxVotes > 0 && winners.length === 1) {
                winnerMsg = winners[0].isSweep ? `Flawless victory for ${winners[0].name}!` : `${winners[0].name} wins!`;
            }
            
            if (winners.length > 1 && totalValidVotes > 0) {
                try { new Audio('draw.wav').play(); } catch(e){ console.log("Audio play prevented"); }
            } else if (winners.length === 1 && winners[0].isSweep) {
                try { new Audio('victory.wav').play(); } catch(e){ console.log("Audio play prevented"); }
            }

            speakText(winnerMsg, settings.tts);

            setTimeout(() => {
                startVotingPhase(clashIndex + 1);
            }, 6000);
        };

            const nextRoundOrEnd = () => {

                });

                    });

                    {gameState === 'GAME_END' && (
