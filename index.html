<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Blersjda Madness</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/4.3.7/mqtt.min.js"></script>
    <style>
        body { 
            background-color: #0f0a29; 
            color: #fff; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            overflow-x: hidden; 
            touch-action: manipulation;
            background-image: radial-gradient(circle at 50% 50%, #20114b 0%, #0f0a29 100%);
        }
        
        /* Typography & Animations */
        .bouncing-title { animation: bounce 2s infinite; text-shadow: 0 4px 15px rgba(236, 72, 153, 0.8); }
        .bouncing-win { animation: bounceWin 0.5s infinite alternate; }
        .fade-in { animation: fadeIn 0.5s ease-out forwards; }
        .scale-in { animation: scaleIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        
        @keyframes bounce { 0%, 100% { transform: translateY(-3%); } 50% { transform: translateY(3%); } }
        @keyframes bounceWin { 0% { transform: scale(1) translateY(0); } 100% { transform: scale(1.1) translateY(-15px); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes scaleIn { from { opacity: 0; transform: scale(0.5); } to { opacity: 1; transform: scale(1); } }
        
        /* UI Elements */
        .glass-panel { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3); }
        input[type="text"], textarea { font-size: 16px; transition: all 0.2s; }
        input[type="text"]:focus, textarea:focus { transform: scale(1.02); }
        
        /* Loading Spinner */
        .spinner { border: 4px solid rgba(255,255,255,0.1); border-left-color: #ec4899; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Popups */
        .floating-popup {
            position: absolute;
            pointer-events: none;
            font-weight: 900;
            text-transform: uppercase;
            animation: floatUpAndFade 3s ease-out forwards;
            opacity: 0;
            z-index: 0;
        }
        @keyframes floatUpAndFade {
            0% { transform: translateY(20px) rotate(-10deg) scale(0.8); opacity: 0; }
            20% { transform: translateY(-10px) rotate(5deg) scale(1.1); opacity: 0.8; }
            80% { transform: translateY(-60px) rotate(-5deg) scale(1); opacity: 0.8; }
            100% { transform: translateY(-80px) rotate(0deg) scale(0.9); opacity: 0; }
        }

        .sweep-text {
            background: linear-gradient(90deg, #ec4899, #eab308, #06b6d4, #ec4899);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 2s linear infinite, scaleIn 0.5s ease-out;
            text-shadow: 0px 0px 20px rgba(236,72,153,0.5);
        }
        @keyframes shine { to { background-position: 200% center; } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo, useCallback } = React;

        // ==========================================

        const PROMPTS = [

            { text: "The worst thing to accidentally text your boss.", family: false },

            { text: "The worst thing to discover on your first date.", family: false },

            { text: "The absolute worst place to get a tattoo.", family: false },
            { text: "What grandma is secretly hiding in her attic.", family: false },
            { text: "The real reason you got fired.", family: false },
            { text: "What your search history says about you.", family: false },
            { text: "A terrible lie to put on your resume.", family: false },
            { text: "The worst thing to find in your bed.", family: false },
            { text: "A terrible idea for a reality TV show.", family: false },
            { text: "The worst thing to moan during a business meeting.", family: false },
            { text: "What your browser's incognito mode is judging you for.", family: false },
            { text: "A terrible text to send your boss at 2 a.m.", family: false },
            { text: "The real reason your boss closed the office blinds.", family: false },
            { text: "Worst thing to discover in your grandma's search history.", family: false },
            { text: "A terrible name for your dating profile.", family: false },
            { text: "What your neighbor's dog has seen through the window.", family: false },
            { text: "The worst thing to yell during an awkward silence on a date.", family: false },
            { text: "What your plants are really doing when you go on vacation.", family: false },
            { text: "A terrible excuse for the noise your roommates heard.", family: false },
            { text: "The favorite TV show of the wettest clown.", family: false },
            { text: "What your spam folder knows about you that you don't.", family: false },
            { text: "A terrible safe word for life in general.", family: false },
            { text: "The real reason that sock is stuck to your ceiling.", family: false },
            { text: "Worst thing to find on your phone after lending it to a friend.", family: false },
        ];

        const DEFAULT_ANSWERS = ["I forgot how to type", "Staring blankly at the wall", "My brain is empty", "Too slow!"];

        const generateCode = () => Math.random().toString(36).substring(2, 6).toUpperCase();
        const generateUUID = () => crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(36).substring(2) + Date.now().toString(36);
        const shuffle = (array) => [...array].sort(() => Math.random() - 0.5);

        const speakText = (text, enabled) => {
            if (!enabled || !('speechSynthesis' in window)) return;
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.rate = 1.05;
            msg.pitch = 1.1;
            window.speechSynthesis.speak(msg);
        };

        // ==========================================
        // MONSTER AVATAR COMPONENT
        // ==========================================
        const AVATAR_COLORS = ['#ec4899', '#22c55e', '#06b6d4', '#f97316', '#eab308'];
        const AVATAR_BODIES = ['blob', 'square', 'triangle'];
        const AVATAR_EYES = ['one', 'two', 'three'];
        const AVATAR_MOUTHS = ['smile', 'fangs', 'flat'];

        const generateAvatar = (existingAvatars = []) => {
            let att, isUnique;
            let attempts = 0;
            do {
                att = {
                    color: AVATAR_COLORS[Math.floor(Math.random() * AVATAR_COLORS.length)],
                    body: AVATAR_BODIES[Math.floor(Math.random() * AVATAR_BODIES.length)],
                    eyes: AVATAR_EYES[Math.floor(Math.random() * AVATAR_EYES.length)],
                    mouth: AVATAR_MOUTHS[Math.floor(Math.random() * AVATAR_MOUTHS.length)],
                };
                isUnique = !existingAvatars.some(a => a.color === att.color && a.body === att.body && a.eyes === att.eyes && a.mouth === att.mouth);
                attempts++;
            } while (!isUnique && attempts < 100);
            return att;
        };

        const MonsterAvatar = ({ attributes, size = 60, className = "" }) => {
            if(!attributes) return null;
            const { color, body, eyes, mouth } = attributes;

            const renderBody = () => {
                switch(body) {
                    case 'square': return <rect x="15" y="20" width="70" height="70" rx="15" fill={color} />;
                    case 'triangle': return <path d="M50 15 L85 85 L15 85 Z" fill={color} strokeLinejoin="round" strokeWidth="5" stroke={color}/>;
                    case 'blob': default: return <path d="M20 50 Q20 20 50 20 T80 50 T50 85 T20 50 Z" fill={color} />;
                }
            };

            const renderEyes = () => {
                switch(eyes) {
                    case 'one': return <g><circle cx="50" cy="45" r="12" fill="white"/><circle cx="50" cy="45" r="5" fill="#0f0a29"/></g>;
                    case 'three': return <g><circle cx="50" cy="32" r="8" fill="white"/><circle cx="50" cy="32" r="3" fill="#0f0a29"/><circle cx="32" cy="45" r="10" fill="white"/><circle cx="32" cy="45" r="4" fill="#0f0a29"/><circle cx="68" cy="45" r="10" fill="white"/><circle cx="68" cy="45" r="4" fill="#0f0a29"/></g>;
                    case 'two': default: return <g><circle cx="35" cy="45" r="10" fill="white"/><circle cx="35" cy="45" r="4" fill="#0f0a29"/><circle cx="65" cy="45" r="10" fill="white"/><circle cx="65" cy="45" r="4" fill="#0f0a29"/></g>;
                }
            };

            const renderMouth = () => {
                switch(mouth) {
                    case 'fangs': return <path d="M35 65 L65 65 L60 75 L55 65 L45 65 L40 75 Z" fill="white" />;
                    case 'flat': return <line x1="40" y1="68" x2="60" y2="68" stroke="#0f0a29" strokeWidth="4" strokeLinecap="round" />;
                    case 'smile': default: return <path d="M35 65 Q50 80 65 65" fill="none" stroke="#0f0a29" strokeWidth="4" strokeLinecap="round" />;
                }
            };

            return (
                <svg width={size} height={size} viewBox="0 0 100 100" className={`drop-shadow-lg ${className}`}>
                    {renderBody()}
                    {renderEyes()}
                    {renderMouth()}
                </svg>
            );
        };

        // ==========================================
        // UI COMPONENTS
        // ==========================================
        const Button = ({ onClick, children, color = "pink", className = "", disabled=false }) => {
            const colorClasses = {
                pink: "bg-pink-600 hover:bg-pink-500 border-pink-800",
                blue: "bg-blue-600 hover:bg-blue-500 border-blue-800",
                green: "bg-green-600 hover:bg-green-500 border-green-800",
                purple: "bg-purple-600 hover:bg-purple-500 border-purple-800",
                gray: "bg-gray-600 hover:bg-gray-500 border-gray-800",
            };
            return (
                <button 
                    onClick={onClick} 
                    disabled={disabled}
                    className={`w-full py-4 px-6 text-xl font-bold uppercase tracking-wider rounded-xl shadow-lg border-b-4 ${colorClasses[color]} active:border-b-0 active:translate-y-1 transition-all ${disabled ? 'opacity-50 cursor-not-allowed transform-none' : ''} ${className}`}
                >
                    {children}
                </button>
            );
        };

        const FloatingPopups = ({ active }) => {
            const [popups, setPopups] = useState([]);
            const words = ["Blersjda!", "Madness!", "Wild!", "Crazy!", "Vote!", "Genius!"];
            const colors = ['#ec4899', '#22c55e', '#06b6d4', '#eab308'];

            useEffect(() => {
                if(!active) return;
                const interval = setInterval(() => {
                    if(Math.random() > 0.4) {
                        const newPopup = {
                            id: Date.now(),
                            text: words[Math.floor(Math.random() * words.length)],
                            x: Math.random() * 80 + 10,
                            y: Math.random() * 80 + 10,
                            color: colors[Math.floor(Math.random() * colors.length)],
                            size: Math.floor(Math.random() * 20 + 20)
                        };
                        setPopups(prev => [...prev.slice(-5), newPopup]);
                    }
                }, 2000);
                return () => clearInterval(interval);
            }, [active]);

            return (
                <div className="fixed inset-0 pointer-events-none overflow-hidden z-0">
                    {popups.map(p => (
                        <div key={p.id} className="floating-popup" style={{ left: `${p.x}%`, top: `${p.y}%`, color: p.color, fontSize: `${p.size}px` }}>
                            {p.text}
                        </div>
                    ))}
                </div>
            );
        };

        // ==========================================
        // MAIN APP COMPONENT
        // ==========================================
        const App = () => {
            const [view, setView] = useState('MENU');
            return (
                <div className="min-h-screen flex flex-col items-center justify-center p-4 relative z-10">
                    {view === 'MENU' && <MainMenu setView={setView} />}
                    {view === 'HOST' && <OnlineHost goBack={() => setView('MENU')} />}
                    {view === 'JOIN' && <OnlineClient goBack={() => setView('MENU')} />}
                </div>
            );
        };

        // ==========================================
        // MAIN MENU
        // ==========================================
        const MainMenu = ({ setView }) => (
            <div className="max-w-md w-full flex flex-col items-center gap-6 scale-in text-center">
                <h1 className="text-6xl md:text-7xl font-black uppercase bouncing-title mb-2 tracking-tight">
                    Blersjda<br/><span className="text-pink-400">Madness</span>
                </h1>
                <p className="text-xl mb-6 text-cyan-300 font-bold tracking-widest uppercase">The Ultimate Party Game</p>
                
                <div className="w-full space-y-4">
                    <Button color="pink" onClick={() => setView('HOST')} className="h-20 text-2xl">📺 Host Game</Button>
                    <Button color="blue" onClick={() => setView('JOIN')} className="h-20 text-2xl">📱 Join Game</Button>
                </div>
                
                <div className="mt-8 text-sm text-purple-200 glass-panel p-5 rounded-2xl w-full">
                    <p className="mb-2"><strong>How to play:</strong> Host puts this on a big screen or TV. Everyone else joins using their phones!</p>
                    <p className="text-pink-300 font-bold">4+ Players Required.</p>
                </div>
            </div>
        );

        // ==========================================
        // ONLINE HOST (THE BIG SCREEN)
        // ==========================================
        const OnlineHost = ({ goBack }) => {
            const [roomCode, setRoomCode] = useState('');
            const [players, setPlayers] = useState([]);
            const [audience, setAudience] = useState([]);
            const [settings, setSettings] = useState({ familyFriendly: false, tts: true });
            
            const [gameState, setGameState] = useState('LOBBY'); // LOBBY, ANSWERING, VOTING, REVEAL, ROUND_END, GAME_END
            const [round, setRound] = useState(1);
            const [clashes, setClashes] = useState([]);
            const [currentClashIndex, setCurrentClashIndex] = useState(0);
            const [timer, setTimer] = useState(0);
            const [usedPrompts, setUsedPrompts] = useState([]);

            const connectionsRef = useRef({});
            const stateRef = useRef();
			
			// Audio ref for background music
            const audioRef = useRef(typeof Audio !== "undefined" ? new Audio('music.wav') : null);
            
            useEffect(() => {
                const audio = audioRef.current;
                if (!audio) return;
                audio.loop = true;
                let fadeInterval;

                if (gameState === 'ANSWERING') {
                    audio.volume = 0;
                    audio.play().catch(e => console.log("Audio play prevented:", e));
                    // Fade in
                    let vol = 0;
                    fadeInterval = setInterval(() => {
                        vol += 0.05;
                        if (vol >= 0.5) { vol = 0.5; clearInterval(fadeInterval); } // 0.5 max volume
                        audio.volume = vol;
                    }, 100);
                } else if (audio.volume > 0) {
                    // Fade out
                    let vol = audio.volume;
                    fadeInterval = setInterval(() => {
                        vol -= 0.1;
                        if (vol <= 0) {
                            vol = 0;
                            clearInterval(fadeInterval);
                            audio.pause();
                            audio.currentTime = 0;
                        }
                        try { audio.volume = vol; } catch(e){}
                    }, 100);
                }
                return () => clearInterval(fadeInterval);
            }, [gameState]);
            
            useEffect(() => {
                stateRef.current = { players, audience, gameState, round, clashes, currentClashIndex, settings };
            }, [players, audience, gameState, round, clashes, currentClashIndex, settings]);

            // Initialize Host Peer
            useEffect(() => {
                const code = generateCode();
                setRoomCode(code);
                
                // Connect securely over TLS via Port 8884 (Required for HTTPS/GitHub Pages)
                const mqttClient = mqtt.connect('wss://broker.hivemq.com:8884/mqtt');
                const mockConnections = {};
            
                mqttClient.on('connect', () => {
                    console.log(`Host successfully secured room topic: blersjda/${code}/host`);
                    // Subscribe to client actions intended for this specific host
                    mqttClient.subscribe(`blersjda/${code}/host`, (err) => {
                        if (err) console.error("Host subscription routing error:", err);
                    });
                });
            
                mqttClient.on('message', (topic, message) => {
                    try {
                        const data = JSON.parse(message.toString());
                        
                        if (data && data.userId) {
                            const userId = data.userId;
                            
                            // Dynamically build a mock connection object mimicking PeerJS interfaces
                            if (!mockConnections[userId]) {
                                mockConnections[userId] = {
                                    open: true,
                                    metadata: { userId },
                                    send: (payload) => {
                                        // Route outgoing server frames directly to this client's private inbox
                                        mqttClient.publish(`blersjda/${code}/client/${userId}`, JSON.stringify(payload));
                                    }
                                };
                            }
                            
                            // Directly feeds your core room orchestration logic unmodified
                            handleClientMessage(data, mockConnections[userId]);
                        }
                    } catch (e) {
                        console.error("Failed to parse host MQTT message packet:", e);
                    }
                });
            
                // Clean up connections when the host terminates or unmounts the lobby
                return () => {
                    if (mqttClient) mqttClient.end();
                };
            }, []);

            // Send to everyone connected
            const broadcast = (type, payload) => {
                Object.values(connectionsRef.current).forEach(conn => {
                    if(conn && conn.open) conn.send({ type, ...payload });
                });
            };

            const sendToClient = (userId, type, payload) => {
                const conn = connectionsRef.current[userId];
                if(conn && conn.open) conn.send({ type, ...payload });
            };

            const handleClientDisconnect = (userId) => {
                // We keep them in state but mark disconnected if needed, but for simplicity
                // we'll rely on active connection checks during broadcasts.
            };

            const syncPlayerState = (userId, isAudience) => {
                const { gameState, clashes, currentClashIndex } = stateRef.current;
                
                if (gameState === 'ANSWERING' && !isAudience) {
                    const myClashes = clashes.filter(c => c.p1.userId === userId || c.p2.userId === userId);
                    const unanswered = myClashes.filter(c => !c.answers[userId]).map(c => c.prompt);
                    if (unanswered.length > 0) {
                        sendToClient(userId, 'STATE_ANSWERING', { prompts: unanswered });
                    } else {
                        sendToClient(userId, 'STATE_WAITING', { msg: "Answers in! Waiting for others..." });
                    }
                } 
                else if (gameState === 'VOTING') {
                    const clash = clashes[currentClashIndex];
                    if (!isAudience && (clash.p1.userId === userId || clash.p2.userId === userId)) {
                        sendToClient(userId, 'STATE_VOTING', { 
                            prompt: clash.prompt, 
                            answers: [
                                { id: clash.p1.userId, text: clash.answers[clash.p1.userId] },
                                { id: clash.p2.userId, text: clash.answers[clash.p2.userId] }
                            ],
                            allowPass: false,
                            readOnly: true,
                            msg: "Your battle! You can't vote, but watch the results."
                        });
                    } else {
                        sendToClient(userId, 'STATE_VOTING', { 
                            prompt: clash.prompt, 
                            answers: [
                                { id: clash.p1.userId, text: clash.answers[clash.p1.userId] },
                                { id: clash.p2.userId, text: clash.answers[clash.p2.userId] }
                            ],
                            allowPass: isAudience,
                            readOnly: false
                        });
                    }
                }
                else {
                    sendToClient(userId, 'STATE_WAITING', { msg: "Look at the big screen!" });
                }
            };

            const handleClientMessage = (data, conn) => {
                if(data.type === 'JOIN') {
                    const { userId, name } = data;
                    conn.metadata = { userId };
                    connectionsRef.current[userId] = conn;

                    setPlayers(prevPlayers => {
                        const existingPlayer = prevPlayers.find(p => p.userId === userId);
                        if (existingPlayer) {
                            existingPlayer.name = name; // Update name
                            existingPlayer.connected = true;
                            setTimeout(() => syncPlayerState(userId, false), 500);
                            return [...prevPlayers];
                        } 
                        
                        if (stateRef.current.gameState === 'LOBBY') {
                            // Check unique name in lobby
                            let finalName = name;
                            if (prevPlayers.some(p => p.name.toLowerCase() === name.toLowerCase())) {
                                finalName = name + ` ${Math.floor(Math.random()*100)}`;
                            }
                            const avatar = generateAvatar(prevPlayers.map(p => p.avatar));
                            conn.send({ type: 'LOBBY_JOINED', isAudience: false });
                            return [...prevPlayers, { userId, name: finalName, score: 0, avatar, connected: true }];
                        } 
                        
                        return prevPlayers;
                    });

                    // Handle audience join if not in lobby
                    if (stateRef.current.gameState !== 'LOBBY') {
                        const isExistingPlayer = stateRef.current.players.some(p => p.userId === userId);
                        if (!isExistingPlayer) {
                            setAudience(prev => {
                                const exists = prev.find(a => a.userId === userId);
                                if (exists) {
                                    exists.name = name;
                                    return [...prev];
                                }
                                return [...prev, { userId, name, connected: true }];
                            });
                            conn.send({ type: 'LOBBY_JOINED', isAudience: true });
                            setTimeout(() => syncPlayerState(userId, true), 500);
                        }
                    }
                }
                
                if(data.type === 'SUBMIT_ANSWER') {
                    setClashes(prev => {
                        const next = [...prev];
                        const clash = next.find(c => c.prompt === data.prompt);
                        if (clash) {
                            clash.answers[data.userId] = data.answer;
                        }
                        return next;
                    });
                }

                if(data.type === 'SUBMIT_VOTE') {
                    setClashes(prev => {
                        const next = [...prev];
                        const clash = next[stateRef.current.currentClashIndex];
                        if (clash) {
                            clash.votes[data.userId] = data.votedFor; 
                        }
                        return next;
                    });
                }
            };

            const startGame = () => {
                if(players.length < 4) return;
                setRound(1);
                startRound(1, players, []);
            };

            const startRound = (r, currentPlayers, prevUsed) => {
                setRound(r);
                
                let available = PROMPTS.filter(p => !prevUsed.includes(p.text));
                if(settings.familyFriendly) available = available.filter(p => p.family);
                available = shuffle(available);

                const newClashes = [];
                const newUsed = [...prevUsed];

                for(let i=0; i<currentPlayers.length; i++) {
                    const p1 = currentPlayers[i];
                    const p2 = currentPlayers[(i+1) % currentPlayers.length];
                    
                    // Fallback if we run out of prompts (rare)
                    const prompt = available.pop() || { text: `Wildcard prompt for ${p1.name} and ${p2.name}!` };
                    newUsed.push(prompt.text);
                    
                    newClashes.push({
                        prompt: prompt.text,
                        p1, p2,
                        answers: {}, 
                        votes: {}   
                    });
                }

                setUsedPrompts(newUsed);
                setClashes(newClashes);
                setGameState('ANSWERING');
                
                currentPlayers.forEach(player => {
                    const myPrompts = newClashes.filter(c => c.p1.userId === player.userId || c.p2.userId === player.userId);
                    sendToClient(player.userId, 'STATE_ANSWERING', { prompts: myPrompts.map(p => p.prompt) });
                });
                
                stateRef.current.audience.forEach(aud => {
                    sendToClient(aud.userId, 'STATE_WAITING', { msg: "Players are answering prompts..." });
                });

                speakText(`Round ${r} begins. Players, look at your devices!`, settings.tts);

                if (r === 3) {
                    speakText(`Welcome to the final round: The Whip of the Blersj!`, settings.tts);
                } else {
                    speakText(`Round ${r} begins. Players, look at your devices!`, settings.tts);
                }

                let timeLeft = 90; // Changed from 60 to 90 seconds
                setTimer(timeLeft);
                broadcast('TIMER_SYNC', { timeLeft }); // Initial sync to clients
                
                const int = setInterval(() => {
                    timeLeft--;
                    setTimer(timeLeft);
                    broadcast('TIMER_SYNC', { timeLeft }); // Sync timer every second
                    
                    const allAnswered = stateRef.current.clashes.every(c => c.answers[c.p1.userId] && c.answers[c.p2.userId]);
                    if(timeLeft <= 0 || allAnswered) {
                        clearInterval(int);
                        setClashes(prev => {
                            const filled = [...prev];
                            filled.forEach(c => {
                                if(!c.answers[c.p1.userId]) c.answers[c.p1.userId] = shuffle(DEFAULT_ANSWERS)[0];
                                if(!c.answers[c.p2.userId]) c.answers[c.p2.userId] = shuffle(DEFAULT_ANSWERS)[0];
                            });
                            return filled;
                        });
                        setTimeout(() => startVotingPhase(0), 1000);
                    }
                }, 1000);
            };

            const startVotingPhase = (clashIndex) => {
                if(clashIndex >= stateRef.current.clashes.length) {
                    setGameState('ROUND_END');
                    speakText(`Round ${stateRef.current.round} is over! Let's see the leaderboard.`, settings.tts);
                    
                    const sortedPlayers = [...stateRef.current.players].sort((a,b) => b.score - a.score);
                    broadcast('STATE_LEADERBOARD', { players: sortedPlayers, round: stateRef.current.round, isFinal: false });
                    return;
                }

                setGameState('VOTING');
                setCurrentClashIndex(clashIndex);
                const clash = stateRef.current.clashes[clashIndex];

                speakText(clash.prompt, settings.tts);

                // Notify Players
                stateRef.current.players.forEach(p => {
                    if(p.userId !== clash.p1.userId && p.userId !== clash.p2.userId) {
                        // Normal voter
                        sendToClient(p.userId, 'STATE_VOTING', { 
                            prompt: clash.prompt, 
                            answers: [ { id: clash.p1.userId, text: clash.answers[clash.p1.userId] }, { id: clash.p2.userId, text: clash.answers[clash.p2.userId] } ],
                            allowPass: false,
                            readOnly: false
                        });
                    } else {
                        // Battling player - can see answers, but cannot vote
                        sendToClient(p.userId, 'STATE_VOTING', { 
                            prompt: clash.prompt, 
                            answers: [ { id: clash.p1.userId, text: clash.answers[clash.p1.userId] }, { id: clash.p2.userId, text: clash.answers[clash.p2.userId] } ],
                            allowPass: false,
                            readOnly: true,
                            msg: "Your battle! You can't vote, but watch the results."
                        });
                    }
                });

                stateRef.current.audience.forEach(a => {
                    sendToClient(a.userId, 'STATE_VOTING', { 
                        prompt: clash.prompt, 
                        answers: [ { id: clash.p1.userId, text: clash.answers[clash.p1.userId] }, { id: clash.p2.userId, text: clash.answers[clash.p2.userId] } ],
                        allowPass: true
                    });
                });

                let timeLeft = 25;
                setTimer(timeLeft);
                const int = setInterval(() => {
                    timeLeft--;
                    setTimer(timeLeft);
                    
                    const currentClash = stateRef.current.clashes[clashIndex];
                    // Count expected connected players who aren't battling
                    const expectedPlayerVotes = stateRef.current.players.filter(p => 
                        connectionsRef.current[p.userId]?.open && p.userId !== currentClash.p1.userId && p.userId !== currentClash.p2.userId
                    ).length;
                    
                    const expectedAudienceVotes = stateRef.current.audience.filter(a => connectionsRef.current[a.userId]?.open).length;
                    
                    const expectedTotal = expectedPlayerVotes + expectedAudienceVotes;
                    const voteCount = Object.keys(currentClash.votes).length;

                    if(timeLeft <= 0 || (expectedTotal > 0 && voteCount >= expectedTotal)) {
                        clearInterval(int);
                        revealWinner(clashIndex);
                    }
                }, 1000);
            };

            const revealWinner = (clashIndex) => {
                setGameState('REVEAL');
                broadcast('STATE_REVEAL', { 
                    prompt: clash.prompt,
                    p1: clash.p1, 
                    p2: clash.p2,
                    p1Answer: clash.answers[clash.p1.userId],
                    p2Answer: clash.answers[clash.p2.userId],
                    p1Votes, p2Votes,
                    p1Score, p2Score
                });
                
                const clash = stateRef.current.clashes[clashIndex];
                const votes = Object.values(clash.votes).filter(v => v !== 'PASS');
                const p1Votes = votes.filter(v => v === clash.p1.userId).length;
                const p2Votes = votes.filter(v => v === clash.p2.userId).length;
                const totalValidVotes = p1Votes + p2Votes;

                const basePoints = stateRef.current.round === 3 ? 4000 : 1000 * stateRef.current.round;
                let p1Score = totalValidVotes > 0 ? Math.floor((p1Votes/totalValidVotes) * basePoints) : 0;
                let p2Score = totalValidVotes > 0 ? Math.floor((p2Votes/totalValidVotes) * basePoints) : 0;

                // Bonuses
                if(p1Votes > p2Votes) p1Score += Math.floor(basePoints * 0.2);
                if(p2Votes > p1Votes) p2Score += Math.floor(basePoints * 0.2);
                
                const isP1Sweep = totalValidVotes > 0 && p1Votes === totalValidVotes;
                const isP2Sweep = totalValidVotes > 0 && p2Votes === totalValidVotes;

                if (isP1Sweep) p1Score += 500;
                if (isP2Sweep) p2Score += 500;

                setPlayers(prev => prev.map(p => {
                    if(p.userId === clash.p1.userId) return { ...p, score: p.score + p1Score };
                    if(p.userId === clash.p2.userId) return { ...p, score: p.score + p2Score };
                    return p;
                }));

                // Attach reveal data temporarily to the clash for rendering
                setClashes(prev => {
                    const next = [...prev];
                    next[clashIndex].revealData = { p1Votes, p2Votes, isP1Sweep, isP2Sweep };
                    return next;
                });

                let winnerMsg = "It's a tie!";
                if(p1Votes > p2Votes) winnerMsg = isP1Sweep ? `Flawless victory for ${clash.p1.name}!` : `${clash.p1.name} wins!`;
                if(p2Votes > p1Votes) winnerMsg = isP2Sweep ? `Flawless victory for ${clash.p2.name}!` : `${clash.p2.name} wins!`;
                
                speakText(winnerMsg, settings.tts);

                setTimeout(() => {
                    startVotingPhase(clashIndex + 1);
                }, 6000);
            };

            const nextRoundOrEnd = () => {
                if(round >= 3) {
                    setGameState('GAME_END');
                    speakText("The game is over! Let's see who mastered the madness!", settings.tts);
                    
                    const sortedPlayers = [...players].sort((a,b) => b.score - a.score);
                    broadcast('STATE_LEADERBOARD', { players: sortedPlayers, isFinal: true });

                    startRound(round + 1, players, usedPrompts);
                }

            // RENDER LOGIC FOR HOST
            const isPlaying = gameState !== 'LOBBY' && gameState !== 'GAME_END';

            return (

                    {isPlaying && (

                    )}

                    {gameState === 'LOBBY' && (

                                    Family Friendly Mode
                                </label>
                                <div className="w-px h-8 bg-white/20"></div>
                                <label className="flex items-center gap-3 cursor-pointer hover:text-pink-300 transition-colors">
                                    <input type="checkbox" checked={settings.tts} onChange={e => setSettings(s => ({...s, tts: e.target.checked}))} className="w-6 h-6 accent-pink-500" />
                                    Voice Announcer
                                </label>

                            <div className="glass-panel p-8 rounded-3xl min-h-[250px] mb-8 w-full border border-purple-500/30">

                                    {players.map(p => (
                                        <div key={p.userId} className="flex flex-col items-center animate-bounce" style={{animationDuration: `${Math.random() * 0.5 + 1.5}s`}}>

                                    {players.length === 0 && (

                    )}

                    {gameState === 'ANSWERING' && (
                        <div className="w-full scale-in">
                            <h2 className="text-6xl font-black mb-2 text-pink-400 uppercase tracking-widest bouncing-title">
                                {round === 3 ? "WHIP OF THE BLERSJ" : `ROUND ${round}`}

                            <div className="glass-panel p-8 rounded-3xl w-full max-w-3xl mx-auto">

                                    {players.map(p => {
                                        const myClashes = clashes.filter(c => c.p1.userId === p.userId || c.p2.userId === p.userId);

                                        return (

                                                <MonsterAvatar attributes={p.avatar} size={70} />
                                                <div className={`mt-3 px-3 py-1 rounded-full font-bold text-sm ${answeredAll ? 'bg-green-500 text-white shadow-[0_0_15px_rgba(34,197,94,0.6)]' : 'bg-gray-600'}`}>

                    {(gameState === 'VOTING' || gameState === 'REVEAL') && (

                                    <p className="text-4xl font-bold mb-12 break-words">"{clashes[currentClashIndex].answers[clashes[currentClashIndex].p1.userId]}"</p>
                                    
                                    {gameState === 'REVEAL' && (

                    )}

                    {gameState === 'ROUND_END' && (
                        <div className="w-full max-w-3xl scale-in">
                            <h2 className="text-6xl font-black mb-10 text-pink-400 uppercase tracking-widest bouncing-title">Round {round} Ranks</h2>

                                {[...players].sort((a,b) => b.score - a.score).map((p, i) => (

                    {gameState === 'GAME_END' && (

        // ==========================================
        // ONLINE CLIENT (THE PHONE)
        // ==========================================
        const OnlineClient = ({ goBack }) => {
            const [conn, setConn] = useState(null);
            const [code, setCode] = useState('');
            const [name, setName] = useState('');
            const [clientState, setClientState] = useState('LOGIN'); 
            
            const [promptsToAnswer, setPromptsToAnswer] = useState([]);
            const [currentPromptIndex, setCurrentPromptIndex] = useState(0);
            const [answerInput, setAnswerInput] = useState('');
			const [clientTimeLeft, setClientTimeLeft] = useState(0);
            
            const [voteData, setVoteData] = useState(null); 
            const [userId] = useState(() => {
                let uid = localStorage.getItem('blersjda_uid');
                if(!uid) { uid = generateUUID(); localStorage.setItem('blersjda_uid', uid); }
                return uid;
            });

            // Recover name if exists
            useEffect(() => {
                const savedName = localStorage.getItem('blersjda_name');
                if(savedName) setName(savedName);
            }, []);

            const joinGame = () => {
                if(!code || !name) return;
                localStorage.setItem('blersjda_name', name);
                
                // Clean and normalize user text input to ensure topic path uniformity
                const roomCode = code.toUpperCase().trim();
                
                // Establish a secure socket connection
                const mqttClient = mqtt.connect('wss://broker.hivemq.com:8884/mqtt');
                
                mqttClient.on('connect', () => {
                    console.log(`Player connecting to secure cluster room: ${roomCode}`);
                    
                    // Subscribe to an isolated private inbound topic for this specific player
                    mqttClient.subscribe(`blersjda/${roomCode}/client/${userId}`, (err) => {
                        if (!err) {
                            // Mock connection object so submitAnswer() and submitVote() execute flawlessly
                            const mockConnection = {
                                send: (payload) => {
                                    mqttClient.publish(`blersjda/${roomCode}/host`, JSON.stringify(payload));
                                }
                            };
                            
                            setConn(mockConnection);
                            
                            // Instantly register with the host
                            mockConnection.send({ type: 'JOIN', userId, name });
                        } else {
                            console.error("Player connection path subscription failed:", err);
                        }
                    });
                });
            
                mqttClient.on('message', (topic, message) => {
                    try {
                        const data = JSON.parse(message.toString());
                        // Delivers game state transitions, prompt lists, and voting options directly to the client UI
                        handleHostMessage(data);
                    } catch (e) {
                        console.error("Failed to parse client inbound MQTT packet:", e);
                    }
                });
            };

            const handleHostMessage = (data) => {
                if(data.type === 'LOBBY_JOINED') {
                    setClientState('WAITING_LOBBY');
                    setVoteData(data.isAudience ? "You joined as Audience!" : "You're in! Look at the big screen.");
                }
                if(data.type === 'STATE_WAITING') {
                    setClientState('WAITING');
                    setVoteData(data.msg);
                }
                if(data.type === 'STATE_ANSWERING') {
                    setPromptsToAnswer(data.prompts);
                    setCurrentPromptIndex(0);
                    setAnswerInput('');
                    setClientState('ANSWERING');
                    if (navigator.vibrate) navigator.vibrate([200, 100, 200]); // Vibrate: BZZZ - pause - BZZZ
                }
                if(data.type === 'STATE_VOTING') {
                    setVoteData(data);
                    setClientState('VOTING');
                    if (navigator.vibrate && !data.readOnly) navigator.vibrate(200); // Short buzz to vote
                }
                if(data.type === 'STATE_LEADERBOARD') {
                    setVoteData(data);
                    setClientState('LEADERBOARD');
                }
				if(data.type === 'TIMER_SYNC') {
                    setClientTimeLeft(data.timeLeft);
                }
                if(data.type === 'STATE_REVEAL') {
                    setVoteData(data);
                    setClientState('REVEAL');
                }
            };

            const submitAnswer = () => {
                if(!answerInput.trim()) return;
                conn.send({ 
                    type: 'SUBMIT_ANSWER', 
                    userId, 
                    answer: answerInput.trim(), 
                    prompt: promptsToAnswer[currentPromptIndex] 
                });
                
                if(currentPromptIndex < promptsToAnswer.length - 1) {
                    setCurrentPromptIndex(prev => prev + 1);
                    setAnswerInput('');
                } else {
                    setClientState('WAITING');
                    setVoteData("Answers submitted! Waiting for others...");
                }
            };

            const submitVote = (playerId) => {
                conn.send({ type: 'SUBMIT_VOTE', userId, votedFor: playerId });
                setClientState('WAITING');
                setVoteData("Vote cast! Look at the screen.");
            };

            return (
                <div className="w-full max-w-md flex flex-col items-center scale-in text-center px-4 relative z-10">
                    {clientState === 'LOGIN' && (
                        <div className="w-full glass-panel p-8 rounded-3xl shadow-2xl border border-pink-500/30">
                            <h2 className="text-4xl font-black mb-8 text-pink-400 uppercase tracking-widest">Join Game</h2>
                            
                            <div className="text-left mb-6">
                                <label className="block text-sm font-bold text-purple-300 mb-2 uppercase tracking-widest ml-2">Room Code</label>
                                <input 
                                    type="text" placeholder="ABCD" maxLength={4}
                                    value={code} onChange={e => setCode(e.target.value.toUpperCase())}
                                    className="w-full p-5 rounded-2xl bg-purple-950/80 border-2 border-pink-500/50 text-center font-mono text-4xl font-black uppercase outline-none focus:border-pink-400 focus:ring-4 focus:ring-pink-500/20 transition-all shadow-inner"
                                />
                            </div>

                            <div className="text-left mb-10">
                                <label className="block text-sm font-bold text-purple-300 mb-2 uppercase tracking-widest ml-2">Your Name</label>
                                <input 
                                    type="text" placeholder="Nickname" maxLength={12}
                                    value={name} onChange={e => setName(e.target.value)}
                                    className="w-full p-5 rounded-2xl bg-purple-950/80 border-2 border-cyan-500/50 text-center font-bold text-3xl outline-none focus:border-cyan-400 focus:ring-4 focus:ring-cyan-500/20 transition-all shadow-inner"
                                />
                            </div>
                            
                            <Button onClick={joinGame} color="pink" disabled={!name.trim() || code.length !== 4} className="h-16">Enter Game</Button>
                            <button onClick={goBack} className="block mx-auto mt-6 text-gray-400 font-bold uppercase tracking-widest text-sm hover:text-white transition-colors">Cancel</button>
                        </div>
                    )}

                    {clientState === 'WAITING_LOBBY' && (
                        <div className="w-full flex flex-col items-center mt-20 p-8 glass-panel rounded-3xl">
                            <div className="spinner mb-8 w-16 h-16 border-8 border-pink-500 border-l-cyan-400"></div>
                            <h2 className="text-4xl font-black text-pink-400 uppercase tracking-widest mb-4">You're In!</h2>
                            <p className="text-2xl text-cyan-200 font-bold">{voteData}</p>
                        </div>
                    )}

                    {clientState === 'WAITING' && (
                        <div className="w-full flex flex-col items-center mt-20 p-8 glass-panel rounded-3xl">
                            <h2 className="text-4xl font-black text-cyan-400 mb-6 uppercase tracking-widest">Hold tight.</h2>
                            <p className="text-2xl text-purple-200 font-bold leading-relaxed">{typeof voteData === 'string' ? voteData : 'Look at the main screen.'}</p>
                        </div>
                    )}

                    {clientState === 'ANSWERING' && (
                        <div className="w-full text-left mt-4 p-6 glass-panel rounded-3xl border-t-8 border-pink-500">
                            <p className="text-cyan-400 font-black tracking-widest uppercase mb-4 text-sm bg-black/30 inline-block px-4 py-1 rounded-full">
                                Prompt {currentPromptIndex + 1} of {promptsToAnswer.length}
                            </p>
                            <h3 className="text-3xl font-black mb-8 leading-snug drop-shadow-md">{promptsToAnswer[currentPromptIndex]}</h3>
                            
                            <div className="text-4xl font-black text-cyan-300 text-center mb-6">
                                {clientTimeLeft}s
                            </div>
                            
                            <div className="relative mb-4">
                                <textarea 
                                    value={answerInput}
                                    maxLength={75}
                                    onChange={e => setAnswerInput(e.target.value)}
                                    placeholder="Type your brilliant answer..."
                                    className={`w-full p-5 rounded-2xl bg-purple-950 border-2 text-2xl font-bold outline-none focus:ring-2 focus:ring-cyan-500/50 h-40 resize-none shadow-inner transition-colors ${answerInput.length >= 65 ? 'border-red-500' : 'border-pink-500 focus:border-cyan-400'}`}
                                />
                                <span className={`absolute bottom-4 right-4 font-mono font-bold text-sm px-2 py-1 rounded bg-black/50 ${answerInput.length >= 65 ? 'text-red-400 animate-pulse' : 'text-purple-400'}`}>
                                    {answerInput.length}/75
                                </span>
                            </div>
                            <Button onClick={submitAnswer} color="pink" disabled={!answerInput.trim()} className="h-16">Submit Answer</Button>
                        </div>
                    )}

                    {clientState === 'VOTING' && voteData && voteData.answers && (
                        <div className="w-full text-center mt-4 p-4 glass-panel rounded-3xl border-t-8 border-cyan-500">
                            <p className="text-cyan-400 font-black mb-6 uppercase tracking-widest text-lg animate-pulse">
                                {voteData.readOnly ? "Watch The Battle!" : "Vote Now"}
                            </p>
                            <h3 className="text-2xl font-bold mb-8 text-purple-200 leading-snug">{voteData.prompt}</h3>
                            
                            {voteData.readOnly && voteData.msg && (
                                <p className="text-pink-400 font-bold mb-4">{voteData.msg}</p>
                            )}
                    
                            <div className="flex flex-col gap-6">
                                {shuffle([...voteData.answers]).map((ans, idx) => (
                                    <button 
                                        key={ans.id}
                                        onClick={() => !voteData.readOnly && submitVote(ans.id)}
                                        disabled={voteData.readOnly}
                                        className={`w-full p-6 ${idx%2===0 ? 'bg-pink-700 border-pink-900' : 'bg-blue-700 border-blue-900'} rounded-2xl text-2xl font-black break-words leading-tight transition-all ${!voteData.readOnly ? 'hover:bg-opacity-80 shadow-[0_8px_0_rgba(0,0,0,0.3)] border-b-8 active:border-b-0 active:translate-y-2' : 'opacity-75 cursor-default border-2'}`}
                                    >
                                        "{ans.text}"
                                    </button>
                                ))}
                            </div>
                            
                            {voteData.allowPass && !voteData.readOnly && (
                                <button 
                                    onClick={() => submitVote('PASS')}
                                    className="mt-8 text-gray-400 hover:text-white font-bold uppercase tracking-widest p-4 transition-colors"
                                >
                                    Pass / Don't Vote
                                </button>
                            )}
                        </div>
                    )}
					{clientState === 'REVEAL' && voteData && voteData.prompt && (
                        <div className="w-full text-center mt-4 p-4 glass-panel rounded-3xl border-t-8 border-green-500 scale-in">
                            <h2 className="text-2xl font-black text-green-400 mb-6 uppercase tracking-widest">Results!</h2>
                            <h3 className="text-xl font-bold mb-6 text-purple-200">{voteData.prompt}</h3>
                            
                            <div className="flex flex-col gap-4 text-left">
                                <div className={`p-4 rounded-xl ${voteData.p1Votes > voteData.p2Votes ? 'bg-green-900/50 border-2 border-green-400' : 'bg-black/30'}`}>
                                    <p className="text-xl font-bold mb-2">"{voteData.p1Answer}"</p>
                                    <p className="text-pink-400 font-black uppercase text-sm mb-2">{voteData.p1.name}</p>
                                    <div className="flex justify-between font-mono font-bold text-sm">
                                        <span className="text-cyan-300 bg-black/50 px-2 py-1 rounded">{voteData.p1Votes} Votes</span>
                                        <span className="text-yellow-300 bg-black/50 px-2 py-1 rounded">+{voteData.p1Score} Pts</span>
                                    </div>
                                </div>

                                <div className={`p-4 rounded-xl ${voteData.p2Votes > voteData.p1Votes ? 'bg-green-900/50 border-2 border-green-400' : 'bg-black/30'}`}>
                                    <p className="text-xl font-bold mb-2">"{voteData.p2Answer}"</p>
                                    <p className="text-blue-400 font-black uppercase text-sm mb-2">{voteData.p2.name}</p>
                                    <div className="flex justify-between font-mono font-bold text-sm">
                                        <span className="text-cyan-300 bg-black/50 px-2 py-1 rounded">{voteData.p2Votes} Votes</span>
                                        <span className="text-yellow-300 bg-black/50 px-2 py-1 rounded">+{voteData.p2Score} Pts</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                    {clientState === 'LEADERBOARD' && voteData && voteData.players && (
                        <div className="w-full max-w-md mt-4 p-6 glass-panel rounded-3xl border-t-8 border-yellow-500 scale-in">
                            <h2 className="text-4xl font-black text-yellow-400 mb-2 uppercase tracking-widest text-center">
                                {voteData.isFinal ? "Final Ranks" : `Round ${voteData.round} Over`}
                            </h2>
                            <p className="text-center text-purple-200 mb-8 font-bold text-sm uppercase tracking-widest">
                                {voteData.isFinal ? "Game Over!" : "Look at the big screen"}
                            </p>
                            
                            <div className="flex flex-col gap-3">
                                {voteData.players.map((p, i) => (
                                    <div key={p.userId} className={`p-4 rounded-xl flex justify-between items-center font-bold shadow-md ${i===0 ? 'bg-yellow-600/30 border border-yellow-500' : 'bg-black/30'}`}>
                                        <div className="flex gap-4 items-center">
                                            <span className={i===0 ? 'text-yellow-400 text-2xl' : 'text-purple-400'}>#{i+1}</span>
                                            <span className="text-xl break-all">{p.name}</span>
                                        </div>
                                        <span className="text-cyan-300 font-mono text-2xl ml-4">{p.score}</span>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
